<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Algocdk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 500: '#ff4500', 600: '#e63e00' },
                        dark: { 900: '#000000', 800: '#1a1a1a', 700: '#333333' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-effect { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-bg { background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="glass-effect rounded-2xl shadow-2xl p-8 w-full max-w-md text-center">
        <div class="w-16 h-16 bg-primary-500 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-lock text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-white mb-2">Reset Password</h1>
        <p class="text-gray-400 text-sm mb-6">Enter your new password below.</p>

        <div id="error-msg" class="hidden mb-4 p-3 bg-red-900/40 border border-red-700 rounded-lg text-red-300 text-sm"></div>
        <div id="success-msg" class="hidden mb-4 p-3 bg-green-900/40 border border-green-700 rounded-lg text-green-300 text-sm"></div>

        <form id="reset-form" class="space-y-4 text-left">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-lock text-gray-500"></i>
                </div>
                <input type="password" id="new-password" placeholder="New password"
                    class="w-full pl-10 pr-10 py-3 rounded-lg bg-dark-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                    required minlength="6">
                <button type="button" onclick="toggleVis('new-password', this)"
                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-300">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-lock text-gray-500"></i>
                </div>
                <input type="password" id="confirm-password" placeholder="Confirm new password"
                    class="w-full pl-10 pr-10 py-3 rounded-lg bg-dark-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                    required minlength="6">
                <button type="button" onclick="toggleVis('confirm-password', this)"
                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-300">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            <button type="submit" id="submit-btn"
                class="w-full py-3 px-4 bg-gradient-to-r from-primary-500 to-red-600 text-white rounded-lg font-semibold shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 flex items-center justify-center gap-2">
                <span>Reset Password</span>
                <i class="fas fa-circle-notch animate-spin hidden" id="spinner"></i>
            </button>
        </form>

        <button onclick="window.location.href='/auth'" class="mt-4 w-full py-3 px-4 bg-dark-800 text-gray-300 rounded-lg font-semibold border border-gray-700 hover:bg-gray-700 hover:text-white transition-all duration-300">
            ← Back to Login
        </button>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) {
            document.getElementById('error-msg').textContent = 'Invalid or missing reset token. Please request a new reset link.';
            document.getElementById('error-msg').classList.remove('hidden');
            document.getElementById('reset-form').classList.add('hidden');
        }

        function toggleVis(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;
            const errEl = document.getElementById('error-msg');
            const okEl = document.getElementById('success-msg');
            const btn = document.getElementById('submit-btn');
            const spinner = document.getElementById('spinner');

            errEl.classList.add('hidden');
            okEl.classList.add('hidden');

            if (newPass !== confirmPass) {
                errEl.textContent = 'Passwords do not match.';
                errEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            spinner.classList.remove('hidden');

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPass })
                });
                const data = await res.json();

                if (res.ok) {
                    okEl.textContent = 'Password reset successfully! Redirecting to login...';
                    okEl.classList.remove('hidden');
                    document.getElementById('reset-form').classList.add('hidden');
                    setTimeout(() => window.location.href = '/auth', 2500);
                } else {
                    errEl.textContent = data.error || 'Failed to reset password. The link may have expired.';
                    errEl.classList.remove('hidden');
                }
            } catch {
                errEl.textContent = 'Something went wrong. Please try again.';
                errEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
