<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Charts | AlgoCDK - Live Trading Charts</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: #0e1117;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #d1d4dc;
        }

        #controls {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #161b22;
            border: 1px solid #2b2f3a;
            border-radius: 6px;
            padding: 8px;
            display: flex;
            gap: 10px;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        select {
            background: #0e1117;
            color: #d1d4dc;
            border: 1px solid #2b2f3a;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        select:focus {
            outline: none;
            border-color: #FF4500;
        }
        
        .indicator-tag {
            background: #2b2f3a;
            color: #d1d4dc;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            display: inline-block;
            margin: 2px;
            transition: all 0.2s ease;
            position: relative;
        }
        
        .indicator-tag:hover {
            background: #FF4500;
            color: white;
        }
        
        .indicator-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: #161b22;
            border: 1px solid #2b2f3a;
            border-radius: 4px;
            padding: 4px;
            margin-top: 2px;
            z-index: 100;
            min-width: 120px;
            display: none;
        }
        
        .indicator-menu.show {
            display: block;
        }
        
        .indicator-menu-item {
            padding: 4px 8px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 3px;
            transition: background 0.2s;
        }
        
        .indicator-menu-item:hover {
            background: #2b2f3a;
        }
        
        /* Modal Dialog */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: #161b22;
            border: 1px solid #2b2f3a;
            border-radius: 8px;
            padding: 20px;
            min-width: 300px;
            max-width: 90%;
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #d1d4dc;
        }
        
        .modal-input {
            width: 100%;
            background: #0e1117;
            color: #d1d4dc;
            border: 1px solid #2b2f3a;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .modal-input:focus {
            outline: none;
            border-color: #FF4500;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }
        
        .modal-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .modal-btn-primary {
            background: #FF4500;
            color: white;
        }
        
        .modal-btn-primary:hover {
            background: #ff5722;
        }
        
        .modal-btn-secondary {
            background: #2b2f3a;
            color: #d1d4dc;
        }
        
        .modal-btn-secondary:hover {
            background: #3b3f4a;
        }

        canvas {
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        /* Brand Header */
        .brand-header {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #2b2f3a;
        }

        .brand-text {
            font-size: 18px;
            font-weight: bold;
        }
        
        .brand-text .brand-algo {
            color: #FF4500;
        }
        
        .brand-text .brand-cdk {
            color: white;
        }

        /* Navigation */
        .nav-links {
            position: fixed;
            bottom: 10px;
            left: 10px;
            z-index: 10;
            display: flex;
            gap: 8px;
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #2b2f3a;
        }

        .nav-link {
            color: #8b949e;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: #FF4500;
            background: rgba(255, 69, 0, 0.1);
        }

        .nav-link.active {
            color: #FF4500;
            background: rgba(255, 69, 0, 0.2);
        }

        /* Price Display */
        .price-display {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #2b2f3a;
            text-align: center;
        }

        .current-price {
            font-size: 18px;
            font-weight: bold;
            color: #d1d4dc;
            margin-bottom: 2px;
        }

        .price-change {
            font-size: 12px;
            font-weight: 500;
        }

        .price-up {
            color: #00c176;
        }

        .price-down {
            color: #ff4d4f;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            #controls {
                flex-wrap: wrap;
                max-width: calc(100vw - 20px);
                font-size: 14px;
                padding: 12px;
                gap: 12px;
            }
            
            select {
                padding: 8px 12px;
                font-size: 14px;
                min-height: 44px;
                min-width: 80px;
            }
            
            .brand-header {
                top: 5px;
                right: 5px;
                padding: 6px 10px;
            }
            
            .brand-text {
                font-size: 14px;
            }
            
            .price-display {
                top: 5px;
                padding: 6px 12px;
            }
            
            .current-price {
                font-size: 16px;
            }
            
            .price-change {
                font-size: 11px;
            }
            
            .nav-links {
                bottom: 5px;
                left: 5px;
                padding: 6px;
                gap: 6px;
            }
            
            .nav-link {
                padding: 8px 10px;
                font-size: 11px;
                min-height: 32px;
                display: flex;
                align-items: center;
            }
            
            .indicator-tag {
                padding: 4px 8px;
                font-size: 12px;
                margin: 1px;
                min-height: 32px;
                display: inline-flex;
                align-items: center;
            }
        }
        
        @media (max-width: 480px) {
            #controls {
                top: 5px;
                left: 5px;
                right: 5px;
                width: auto;
                max-width: none;
            }
            
            .price-display {
                left: 5px;
                right: 5px;
                width: auto;
                transform: none;
            }
            
            .nav-links {
                left: 5px;
                right: 5px;
                width: auto;
                justify-content: space-around;
            }
            
            .nav-link {
                flex: 1;
                text-align: center;
                padding: 6px 4px;
                font-size: 10px;
            }
        }
    </style>
</head>

<body>
    <!-- Brand Header -->
    <div class="brand-header">
        <div class="brand-text">
            <span class="brand-algo">Algo</span><span class="brand-cdk">cdk</span>
        </div>
    </div>

    <!-- Price Display -->
    <div class="price-display">
        <div class="current-price" id="currentPrice">--</div>
        <div class="price-change" id="priceChange">--</div>
    </div>

    <!-- Controls -->
    <div id="controls">
        <select id="symbol">
            <optgroup label="Volatility Indices">
                <option value="R_10">Volatility 10 Index</option>
                <option value="R_25">Volatility 25 Index</option>
                <option value="R_50">Volatility 50 Index</option>
                <option value="R_75">Volatility 75 Index</option>
                <option value="R_100" selected>Volatility 100 Index</option>
            </optgroup>
            <optgroup label="Crash/Boom Indices">
                <option value="BOOM300N">Boom 300 Index</option>
                <option value="BOOM500">Boom 500 Index</option>
                <option value="BOOM1000">Boom 1000 Index</option>
                <option value="CRASH300N">Crash 300 Index</option>
                <option value="CRASH500">Crash 500 Index</option>
                <option value="CRASH1000">Crash 1000 Index</option>
            </optgroup>
            <optgroup label="Step Index">
                <option value="stpRNG">Step Index</option>
            </optgroup>
            <optgroup label="Basket Indices">
                <option value="WLDAUD">AUD Basket</option>
                <option value="WLDEUR">EUR Basket</option>
                <option value="WLDGBP">GBP Basket</option>
                <option value="WLDUSD">USD Basket</option>
            </optgroup>
            <optgroup label="Major Pairs">
                <option value="frxAUDJPY">AUD/JPY</option>
                <option value="frxAUDUSD">AUD/USD</option>
                <option value="frxEURGBP">EUR/GBP</option>
                <option value="frxEURJPY">EUR/JPY</option>
                <option value="frxEURUSD">EUR/USD</option>
                <option value="frxGBPJPY">GBP/JPY</option>
                <option value="frxGBPUSD">GBP/USD</option>
                <option value="frxUSDCAD">USD/CAD</option>
                <option value="frxUSDCHF">USD/CHF</option>
                <option value="frxUSDJPY">USD/JPY</option>
            </optgroup>
            <optgroup label="Cryptocurrencies">
                <option value="cryBTCUSD">BTC/USD</option>
                <option value="cryETHUSD">ETH/USD</option>
                <option value="cryLTCUSD">LTC/USD</option>
            </optgroup>
        </select>

        <select id="timeframe">
            <option value="10">10s</option>
            <option value="30">30s</option>
            <option value="60" selected>1m</option>
            <option value="180">3m</option>
            <option value="300">5m</option>
            <option value="900">15m</option>
            <option value="1800">30m</option>
            <option value="3600">1h</option>
            <option value="14400">4h</option>
            <option value="86400">1D</option>
        </select>
        
        <select id="indicators">
            <option value="">Add Indicator</option>
            <option value="ma">Moving Average</option>
            <option value="bb">Bollinger Bands</option>
            <option value="rsi">RSI</option>
            <option value="macd">MACD</option>
            <option value="stoch">Stochastic</option>
            <option value="atr">ATR</option>
            <option value="create">Create Custom</option>
            <option value="load">Load Custom</option>
        </select>
        
        <input type="file" id="customIndicatorFile" accept=".js" style="display: none;">
        <textarea id="customIndicatorCode" style="display: none; position: fixed; top: 150px; left: 50%; transform: translateX(-50%); width: 500px; height: 400px; background: #1a1a1a; color: #d1d4dc; border: 1px solid #444; font-family: monospace; font-size: 12px; z-index: 200; padding: 10px;"></textarea>
        <div id="customIndicatorButtons" style="display: none; position: fixed; top: 560px; left: 50%; transform: translateX(-50%); z-index: 200;">
            <button onclick="saveCustomIndicator()" style="background: #4a5568; border: none; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-right: 5px;">Save & Add</button>
            <button onclick="cancelCustomIndicator()" style="background: #666; border: none; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer;">Cancel</button>
        </div>
        
        <select id="drawingTools">
            <option value="">Drawing Tools</option>
            <option value="text">Text Label</option>
            <option value="trendline">Trendline</option>
            <option value="ray">Ray</option>
            <option value="horizontal">Horizontal Line</option>
            <option value="vertical">Vertical Line</option>
            <option value="arrow">Arrow</option>
            <option value="rectangle">Rectangle</option>
            <option value="triangle">Triangle</option>
            <option value="circle">Circle</option>
            <option value="fibonacci">Fibonacci</option>
            <option value="fibext">Fib Extension</option>
            <option value="channel">Channel</option>
            <option value="pitchfork">Pitchfork</option>
            <option value="gann">Gann Fan</option>
        </select>
        
        <select id="chartType" style="background: #0e1117; color: #d1d4dc; border: 1px solid #2b2f3a; padding: 4px 8px; border-radius: 4px; min-width: 100px;">
            <option value="candles">Candles</option>
            <option value="line">Line</option>
            <option value="area">Area</option>
            <option value="bars">Bars</option>
        </select>
        
        <div id="activeIndicators"></div>
    </div>

    <!-- Navigation Links -->
    <div class="nav-links">
        <a href="app" class="nav-link">Dashboard</a>
        <a href="mybots" class="nav-link">My Bots</a>
        <a href="botstore" class="nav-link">Marketplace</a>
        <a href="marketchart" class="nav-link active">Charts</a>
        <a href="support" class="nav-link">Support</a>
    </div>

    <canvas id="chart"></canvas>

    <!-- Modal Dialog -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Input</div>
            <div id="modalInputs"></div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="modal-btn modal-btn-primary" onclick="submitModal()">OK</button>
            </div>
        </div>
    </div>

    <script>
        /* ================= CONFIG ================= */
        let SYMBOL = localStorage.getItem('chart_symbol') || "R_100";
        let TIMEFRAME = parseInt(localStorage.getItem('chart_timeframe')) || 60;
        const MAX_CANDLES = 500;

        /* ================= STATE ================= */
        let candles = [];
        let currentCandle = null;
        let ws = null;
        let indicators = [];
        let indicatorIdCounter = 0;
        let customIndicators = new Map();
        let drawingObjects = [];
        let selectedTool = null;
        let drawingInProgress = null;
        let selectedObject = null;
        let dragHandle = null;
        let dragStartX = 0;
        let dragStartY = 0;
        let objStartX1 = 0;
        let objStartY1 = 0;
        let objStartX2 = 0;
        let objStartY2 = 0;
        let chartType = 'candles';
        let isLoading = false;

        /* ================= VIEWPORT ================= */
        let zoom = 1;              // candle width multiplier
        let offset = 0;            // scroll offset (candles)
        let isDragging = false;
        let lastX = 0;
        
        /* ================= MODAL ================= */
        let modalResolve = null;
        
        function showModal(title, inputs) {
            return new Promise((resolve) => {
                modalResolve = resolve;
                document.getElementById('modalTitle').textContent = title;
                const container = document.getElementById('modalInputs');
                container.innerHTML = '';
                
                inputs.forEach(input => {
                    const inp = document.createElement('input');
                    inp.className = 'modal-input';
                    inp.type = input.type || 'text';
                    inp.placeholder = input.label;
                    inp.value = input.value || '';
                    inp.id = input.id;
                    container.appendChild(inp);
                });
                
                document.getElementById('modal').classList.add('show');
                setTimeout(() => container.querySelector('input')?.focus(), 100);
            });
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            if (modalResolve) {
                modalResolve(null);
                modalResolve = null;
            }
        }
        
        function submitModal() {
            const inputs = document.querySelectorAll('#modalInputs input');
            const values = {};
            inputs.forEach(inp => {
                values[inp.id] = inp.value;
            });
            document.getElementById('modal').classList.remove('show');
            if (modalResolve) {
                modalResolve(values);
                modalResolve = null;
            }
        }
        
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.getElementById('modal').classList.contains('show')) {
                submitModal();
            }
        });

        /* ================= CANVAS ================= */
        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        /* ================= CONTROLS ================= */
        document.getElementById("symbol").onchange = e => {
            SYMBOL = e.target.value;
            localStorage.setItem('chart_symbol', SYMBOL);
            restart();
        };

        document.getElementById("timeframe").onchange = e => {
            TIMEFRAME = +e.target.value;
            localStorage.setItem('chart_timeframe', TIMEFRAME);
            restart();
        };
        
        document.getElementById("chartType").onchange = e => {
            chartType = e.target.value;
            localStorage.setItem('chart_type', chartType);
            draw();
        };
        
        document.getElementById("indicators").onchange = e => {
            if (e.target.value) {
                if (e.target.value === 'ma') {
                    addMovingAverage();
                } else if (e.target.value === 'create') {
                    showCustomIndicatorCreator();
                } else if (e.target.value === 'load') {
                    document.getElementById('customIndicatorFile').click();
                } else {
                    addIndicator(e.target.value);
                }
                e.target.value = "";
            }
        };
        
        document.getElementById('customIndicatorFile').onchange = e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const code = event.target.result;
                        const customIndicator = eval(`(${code})`);
                        loadCustomIndicator(customIndicator);
                    } catch (error) {
                        alert('Error loading custom indicator: ' + error.message);
                    }
                };
                reader.readAsText(file);
            }
        };
        
        document.getElementById("drawingTools").onchange = e => {
            if (e.target.value) {
                selectedTool = e.target.value;
                canvas.style.cursor = "crosshair";
                e.target.value = "";
            }
        };

        /* ================= WS ================= */
        function connect() {
            isLoading = true;
            draw();
            ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

            ws.onopen = () => {
                ws.send(JSON.stringify({
                    ticks_history: SYMBOL,
                    style: "candles",
                    granularity: TIMEFRAME,
                    count: MAX_CANDLES,
                    end: "latest"
                }));
                ws.send(JSON.stringify({ ticks: SYMBOL, subscribe: 1 }));
            };

            ws.onmessage = e => {
                const d = JSON.parse(e.data);
                if (d.error) return;

                if (d.candles) {
                    candles = d.candles.map(c => ({
                        time: Math.floor(c.epoch / TIMEFRAME) * TIMEFRAME,
                        open: +c.open,
                        high: +c.high,
                        low: +c.low,
                        close: +c.close
                    }));
                    currentCandle = null;
                    offset = 0;
                    isLoading = false;
                    draw();
                }

                if (d.tick) {
                    updateCandle(+d.tick.quote, d.tick.epoch);
                }
            };
        }

        function restart() {
            if (ws) ws.close();
            candles = [];
            currentCandle = null;
            zoom = 1;
            offset = 0;
            drawingObjects = [];
            selectedObject = null;
            connect();
            loadDrawings();
        }

        /* ================= CANDLE ENGINE ================= */
        function updateCandle(price, epoch) {
            const t = Math.floor(epoch / TIMEFRAME) * TIMEFRAME;

            if (!currentCandle || currentCandle.time !== t) {
                if (currentCandle) {
                    candles.push(currentCandle);
                    if (candles.length > MAX_CANDLES) candles.shift();
                }
                currentCandle = { time: t, open: price, high: price, low: price, close: price };
            } else {
                currentCandle.high = Math.max(currentCandle.high, price);
                currentCandle.low = Math.min(currentCandle.low, price);
                currentCandle.close = price;
            }
            
            // Update price display
            updatePriceDisplay(price);
            draw();
        }

        /* ================= PRICE DISPLAY ================= */
        function updatePriceDisplay(currentPrice) {
            const priceEl = document.getElementById('currentPrice');
            const changeEl = document.getElementById('priceChange');
            
            if (candles.length > 0) {
                const previousPrice = candles[candles.length - 1]?.close || currentPrice;
                const change = currentPrice - previousPrice;
                const changePercent = ((change / previousPrice) * 100).toFixed(2);
                
                priceEl.textContent = currentPrice.toFixed(5);
                changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(5)} (${change >= 0 ? '+' : ''}${changePercent}%)`;
                changeEl.className = `price-change ${change >= 0 ? 'price-up' : 'price-down'}`;
            } else {
                priceEl.textContent = currentPrice.toFixed(5);
                changeEl.textContent = '--';
            }
        }

        /* ================= INTERACTION ================= */
        // Mouse interaction
        canvas.addEventListener("mousedown", e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (selectedTool) {
                startDrawing(x, y);
            } else {
                const clicked = findObjectAt(x, y);
                if (clicked) {
                    selectedObject = clicked;
                    dragHandle = findHandle(clicked, x, y);
                    dragStartX = x;
                    dragStartY = y;
                    objStartX1 = clicked.x1;
                    objStartY1 = clicked.y1;
                    objStartX2 = clicked.x2;
                    objStartY2 = clicked.y2;
                    canvas.style.cursor = "move";
                    draw();
                } else {
                    selectedObject = null;
                    isDragging = true;
                    lastX = e.clientX;
                }
            }
        });
        
        window.addEventListener("mouseup", e => {
            if (drawingInProgress) {
                finishDrawing();
            }
            isDragging = false;
            dragHandle = null;
            if (!selectedObject) {
                canvas.style.cursor = "grab";
            }
        });
        
        window.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (drawingInProgress) {
                updateDrawing(x, y);
                draw();
            } else if (selectedObject && dragHandle) {
                updateObjectHandle(selectedObject, dragHandle, x, y);
                draw();
            } else if (isDragging) {
                offset += (e.clientX - lastX) / 10;
                lastX = e.clientX;
                draw();
            } else {
                const obj = findObjectAt(x, y);
                if (obj) {
                    const handle = findHandle(obj, x, y);
                    canvas.style.cursor = handle === "move" ? "move" : "nwse-resize";
                } else {
                    canvas.style.cursor = selectedTool ? "crosshair" : "grab";
                }
            }
        });

        // Touch interaction for mobile
        canvas.addEventListener("touchstart", e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            const y = e.touches[0].clientY - rect.top;
            
            if (e.touches.length === 1) {
                if (selectedTool) {
                    startDrawing(x, y);
                } else {
                    const clicked = findObjectAt(x, y);
                    if (clicked) {
                        selectedObject = clicked;
                        dragHandle = findHandle(clicked, x, y);
                        dragStartX = x;
                        dragStartY = y;
                        objStartX1 = clicked.x1;
                        objStartY1 = clicked.y1;
                        objStartX2 = clicked.x2;
                        objStartY2 = clicked.y2;
                        draw();
                    } else {
                        selectedObject = null;
                        isDragging = true;
                        lastX = e.touches[0].clientX;
                    }
                }
            }
        });
        
        canvas.addEventListener("touchmove", e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            const y = e.touches[0].clientY - rect.top;
            
            if (e.touches.length === 1) {
                if (drawingInProgress) {
                    updateDrawing(x, y);
                    draw();
                } else if (selectedObject && dragHandle) {
                    updateObjectHandle(selectedObject, dragHandle, x, y);
                    draw();
                } else if (isDragging) {
                    offset += (e.touches[0].clientX - lastX) / 10;
                    lastX = e.touches[0].clientX;
                    draw();
                }
            } else if (e.touches.length === 2) {
                // Pinch zoom
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];
                const distance = Math.sqrt(
                    Math.pow(touch2.clientX - touch1.clientX, 2) + 
                    Math.pow(touch2.clientY - touch1.clientY, 2)
                );
                
                if (window.lastTouchDistance) {
                    const delta = distance - window.lastTouchDistance;
                    zoom += delta * 0.01;
                    zoom = Math.max(0.5, Math.min(3, zoom));
                    draw();
                }
                window.lastTouchDistance = distance;
            }
        });
        
        canvas.addEventListener("touchend", e => {
            e.preventDefault();
            if (drawingInProgress) {
                finishDrawing();
            }
            isDragging = false;
            dragHandle = null;
            window.lastTouchDistance = null;
        });

        // Zoom (wheel)
        canvas.addEventListener("wheel", e => {
            e.preventDefault();
            zoom += e.deltaY * -0.001;
            zoom = Math.max(0.5, Math.min(3, zoom));
            draw();
        });
        
        // Delete selected object
        window.addEventListener("keydown", e => {
            if ((e.key === "Delete" || e.key === "Backspace") && selectedObject) {
                drawingObjects = drawingObjects.filter(obj => obj !== selectedObject);
                selectedObject = null;
                saveDrawings();
                draw();
            } else if (e.key === "Escape") {
                selectedTool = null;
                selectedObject = null;
                canvas.style.cursor = "grab";
                draw();
            }
        });

        /* ================= DRAWING TOOLS ================= */
        function getCandleIndexFromX(x) {
            const pad = window.innerWidth <= 768 ? 40 : 70;
            const baseCandleSpacing = window.innerWidth <= 768 ? 4 : 6;
            const candleSpacing = baseCandleSpacing * zoom;
            const w = canvas.width - pad * 2;
            const visible = Math.floor(w / candleSpacing);
            let data = [...candles];
            if (currentCandle) data.push(currentCandle);
            const start = Math.max(0, data.length - visible - Math.floor(offset));
            const relativeIndex = Math.floor((x - pad) / candleSpacing);
            return start + relativeIndex;
        }
        
        function getPriceFromY(y) {
            let data = [...candles];
            if (currentCandle) data.push(currentCandle);
            if (!data.length) return 0;
            const pad = window.innerWidth <= 768 ? 40 : 70;
            const h = canvas.height - pad * 2;
            const baseCandleSpacing = window.innerWidth <= 768 ? 4 : 6;
            const candleSpacing = baseCandleSpacing * zoom;
            const w = canvas.width - pad * 2;
            const visible = Math.floor(w / candleSpacing);
            const start = Math.max(0, data.length - visible - Math.floor(offset));
            const view = data.slice(start, start + visible);
            if (!view.length) return 0;
            const max = Math.max(...view.map(c => c.high));
            const min = Math.min(...view.map(c => c.low));
            const range = max - min || 1;
            return max - ((y - pad) / h) * range;
        }
        
        function getXFromCandleIndex(index) {
            const pad = window.innerWidth <= 768 ? 40 : 70;
            const baseCandleSpacing = window.innerWidth <= 768 ? 4 : 6;
            const candleSpacing = baseCandleSpacing * zoom;
            const w = canvas.width - pad * 2;
            const visible = Math.floor(w / candleSpacing);
            let data = [...candles];
            if (currentCandle) data.push(currentCandle);
            const start = Math.max(0, data.length - visible - Math.floor(offset));
            const relativeIndex = index - start;
            return pad + relativeIndex * candleSpacing + candleSpacing / 2;
        }
        
        function getYFromPrice(price) {
            let data = [...candles];
            if (currentCandle) data.push(currentCandle);
            if (!data.length) return 0;
            const pad = window.innerWidth <= 768 ? 40 : 70;
            const h = canvas.height - pad * 2;
            const baseCandleSpacing = window.innerWidth <= 768 ? 4 : 6;
            const candleSpacing = baseCandleSpacing * zoom;
            const w = canvas.width - pad * 2;
            const visible = Math.floor(w / candleSpacing);
            const start = Math.max(0, data.length - visible - Math.floor(offset));
            const view = data.slice(start, start + visible);
            if (!view.length) return pad;
            const max = Math.max(...view.map(c => c.high));
            const min = Math.min(...view.map(c => c.low));
            const range = max - min || 1;
            return pad + h - ((price - min) / range) * h;
        }
        
        async function startDrawing(x, y) {
            const candleIndex = getCandleIndexFromX(x);
            const price = getPriceFromY(y);
            const obj = { 
                type: selectedTool, 
                startIndex: candleIndex,
                startPrice: price,
                endIndex: candleIndex,
                endPrice: price,
                color: "#FF4500" 
            };
            if (selectedTool === "text") {
                const result = await showModal('Add Text', [
                    { id: 'text', label: 'Enter text', value: 'Text' }
                ]);
                obj.text = result?.text || "Text";
            }
            drawingInProgress = obj;
        }
        
        function updateDrawing(x, y) {
            if (drawingInProgress) {
                drawingInProgress.endIndex = getCandleIndexFromX(x);
                drawingInProgress.endPrice = getPriceFromY(y);
            }
        }
        
        function finishDrawing() {
            if (drawingInProgress) {
                drawingObjects.push(drawingInProgress);
                saveDrawings();
                drawingInProgress = null;
                selectedTool = null;
                canvas.style.cursor = "grab";
            }
        }
        
        function findObjectAt(x, y) {
            for (let i = drawingObjects.length - 1; i >= 0; i--) {
                const obj = drawingObjects[i];
                if (isPointNearObject(obj, x, y)) return obj;
            }
            return null;
        }
        
        function isPointNearObject(obj, x, y, threshold = 15) {
            const x1 = getXFromCandleIndex(obj.startIndex);
            const y1 = getYFromPrice(obj.startPrice);
            const x2 = getXFromCandleIndex(obj.endIndex);
            const y2 = getYFromPrice(obj.endPrice);
            
            if (obj.type === "trendline" || obj.type === "ray" || obj.type === "arrow") {
                return distanceToLine(x, y, x1, y1, x2, y2) < threshold;
            } else if (obj.type === "horizontal") {
                return Math.abs(y - y1) < threshold;
            } else if (obj.type === "vertical") {
                return Math.abs(x - x1) < threshold;
            } else if (obj.type === "rectangle") {
                const minX = Math.min(x1, x2);
                const maxX = Math.max(x1, x2);
                const minY = Math.min(y1, y2);
                const maxY = Math.max(y1, y2);
                const onBorder = (
                    (Math.abs(x - minX) < threshold && y >= minY && y <= maxY) ||
                    (Math.abs(x - maxX) < threshold && y >= minY && y <= maxY) ||
                    (Math.abs(y - minY) < threshold && x >= minX && x <= maxX) ||
                    (Math.abs(y - maxY) < threshold && x >= minX && x <= maxX)
                );
                const inside = x >= minX && x <= maxX && y >= minY && y <= maxY;
                return onBorder || inside;
            } else if (obj.type === "triangle") {
                const midX = (x1 + x2) / 2;
                return distanceToLine(x, y, midX, y1, x1, y2) < threshold ||
                       distanceToLine(x, y, x1, y2, x2, y2) < threshold ||
                       distanceToLine(x, y, x2, y2, midX, y1) < threshold;
            } else if (obj.type === "circle") {
                const radius = Math.abs(x2 - x1) / 2;
                const centerX = (x1 + x2) / 2;
                const centerY = (y1 + y2) / 2;
                const dist = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));
                return Math.abs(dist - radius) < threshold;
            } else if (obj.type === "fibonacci" || obj.type === "fibext" || obj.type === "channel" || obj.type === "pitchfork" || obj.type === "gann") {
                const minX = Math.min(x1, x2);
                const maxX = Math.max(x1, x2);
                const minY = Math.min(y1, y2);
                const maxY = Math.max(y1, y2);
                return x >= minX - threshold && x <= maxX + threshold && y >= minY - threshold && y <= maxY + threshold;
            } else if (obj.type === "text") {
                ctx.font = "14px Arial";
                const metrics = ctx.measureText(obj.text || "Text");
                return x >= x1 - 5 && x <= x1 + metrics.width + 5 && 
                       y >= y1 - 20 && y <= y1 + 5;
            }
            return false;
        }
        
        function distanceToLine(px, py, x1, y1, x2, y2) {
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;
            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            let param = -1;
            if (lenSq !== 0) param = dot / lenSq;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            const dx = px - xx;
            const dy = py - yy;
            return Math.sqrt(dx * dx + dy * dy);
        }
        
        function findHandle(obj, x, y) {
            const threshold = 15;
            const x1 = getXFromCandleIndex(obj.startIndex);
            const y1 = getYFromPrice(obj.startPrice);
            const x2 = getXFromCandleIndex(obj.endIndex);
            const y2 = getYFromPrice(obj.endPrice);
            if (Math.abs(x - x1) < threshold && Math.abs(y - y1) < threshold) return "start";
            if (Math.abs(x - x2) < threshold && Math.abs(y - y2) < threshold) return "end";
            return "move";
        }
        
        function updateObjectHandle(obj, handle, x, y) {
            const newIndex = getCandleIndexFromX(x);
            const newPrice = getPriceFromY(y);
            
            if (handle === "start") {
                obj.startIndex = newIndex;
                obj.startPrice = newPrice;
                if (obj.type === "horizontal") {
                    obj.endPrice = newPrice;
                }
            } else if (handle === "end") {
                obj.endIndex = newIndex;
                obj.endPrice = newPrice;
                if (obj.type === "horizontal") {
                    obj.startPrice = newPrice;
                }
            } else if (handle === "move") {
                const deltaIndex = newIndex - getCandleIndexFromX(dragStartX);
                const deltaPrice = newPrice - getPriceFromY(dragStartY);
                obj.startIndex = objStartX1 + deltaIndex;
                obj.startPrice = objStartY1 + deltaPrice;
                obj.endIndex = objStartX2 + deltaIndex;
                obj.endPrice = objStartY2 + deltaPrice;
            }
            saveDrawings();
        }
        
        function drawObjects() {
            [...drawingObjects, drawingInProgress].filter(Boolean).forEach(obj => {
                const x1 = getXFromCandleIndex(obj.startIndex);
                const y1 = getYFromPrice(obj.startPrice);
                const x2 = getXFromCandleIndex(obj.endIndex);
                const y2 = getYFromPrice(obj.endPrice);
                
                ctx.strokeStyle = obj.color;
                ctx.fillStyle = obj.color;
                ctx.lineWidth = 2;
                
                if (obj.type === "trendline") {
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                } else if (obj.type === "ray") {
                    const dx = x2 - x1;
                    const dy = y2 - y1;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    if (length > 0) {
                        const extendX = x1 + (dx / length) * canvas.width;
                        const extendY = y1 + (dy / length) * canvas.width;
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(extendX, extendY);
                        ctx.stroke();
                    }
                } else if (obj.type === "horizontal") {
                    ctx.beginPath();
                    ctx.moveTo(0, y1);
                    ctx.lineTo(canvas.width, y1);
                    ctx.stroke();
                } else if (obj.type === "vertical") {
                    ctx.beginPath();
                    ctx.moveTo(x1, 0);
                    ctx.lineTo(x1, canvas.height);
                    ctx.stroke();
                } else if (obj.type === "arrow") {
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    const angle = Math.atan2(y2 - y1, x2 - x1);
                    const headLength = 15;
                    ctx.beginPath();
                    ctx.moveTo(x2, y2);
                    ctx.lineTo(x2 - headLength * Math.cos(angle - Math.PI / 6), y2 - headLength * Math.sin(angle - Math.PI / 6));
                    ctx.moveTo(x2, y2);
                    ctx.lineTo(x2 - headLength * Math.cos(angle + Math.PI / 6), y2 - headLength * Math.sin(angle + Math.PI / 6));
                    ctx.stroke();
                } else if (obj.type === "rectangle") {
                    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
                } else if (obj.type === "triangle") {
                    const midX = (x1 + x2) / 2;
                    ctx.beginPath();
                    ctx.moveTo(midX, y1);
                    ctx.lineTo(x1, y2);
                    ctx.lineTo(x2, y2);
                    ctx.closePath();
                    ctx.stroke();
                } else if (obj.type === "circle") {
                    const radius = Math.abs(x2 - x1) / 2;
                    const centerX = (x1 + x2) / 2;
                    const centerY = (y1 + y2) / 2;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                    ctx.stroke();
                } else if (obj.type === "fibonacci") {
                    const levels = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1];
                    const height = y2 - y1;
                    levels.forEach(level => {
                        const y = y1 + height * level;
                        ctx.globalAlpha = 0.7;
                        ctx.beginPath();
                        ctx.moveTo(Math.min(x1, x2), y);
                        ctx.lineTo(Math.max(x1, x2), y);
                        ctx.stroke();
                        ctx.fillText(`${(level * 100).toFixed(1)}%`, Math.min(x1, x2) + 5, y - 5);
                    });
                    ctx.globalAlpha = 1;
                } else if (obj.type === "fibext") {
                    const levels = [0, 0.618, 1, 1.272, 1.618, 2.618];
                    const height = y2 - y1;
                    levels.forEach(level => {
                        const y = y1 + height * level;
                        ctx.globalAlpha = 0.7;
                        ctx.beginPath();
                        ctx.moveTo(Math.min(x1, x2), y);
                        ctx.lineTo(Math.max(x1, x2), y);
                        ctx.stroke();
                        ctx.fillText(`${(level * 100).toFixed(1)}%`, Math.min(x1, x2) + 5, y - 5);
                    });
                    ctx.globalAlpha = 1;
                } else if (obj.type === "channel") {
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    const offset = (y2 - y1) * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1 + offset);
                    ctx.lineTo(x2, y2 + offset);
                    ctx.stroke();
                } else if (obj.type === "pitchfork") {
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    const diff = (y2 - y1) * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1 - diff);
                    ctx.lineTo(x2, y2 - diff);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x1, y1 + diff);
                    ctx.lineTo(x2, y2 + diff);
                    ctx.stroke();
                } else if (obj.type === "gann") {
                    const angles = [15, 30, 45, 60, 75];
                    const length = 200;
                    angles.forEach(angle => {
                        const radians = (angle * Math.PI) / 180;
                        ctx.globalAlpha = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x1 + length * Math.cos(radians), y1 - length * Math.sin(radians));
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x1 + length * Math.cos(-radians), y1 - length * Math.sin(-radians));
                        ctx.stroke();
                    });
                    ctx.globalAlpha = 1;
                } else if (obj.type === "text") {
                    ctx.font = "14px Arial";
                    ctx.fillText(obj.text, x1, y1);
                }
                
                if (obj === selectedObject) {
                    ctx.fillStyle = "#00FF00";
                    ctx.strokeStyle = "#FFFFFF";
                    ctx.lineWidth = 2;
                    
                    // Draw handles for all types
                    ctx.beginPath();
                    ctx.arc(x1, y1, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    
                    if (obj.type !== "horizontal" && obj.type !== "vertical") {
                        ctx.beginPath();
                        ctx.arc(x2, y2, 6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                    }
                    
                    // Draw selection box for complex shapes
                    if (obj.type === "rectangle" || obj.type === "text" || obj.type === "triangle" || obj.type === "circle") {
                        ctx.strokeStyle = "#00FF00";
                        ctx.lineWidth = 1;
                        ctx.setLineDash([5, 5]);
                        if (obj.type === "rectangle") {
                            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
                        } else if (obj.type === "text") {
                            ctx.font = "14px Arial";
                            const metrics = ctx.measureText(obj.text);
                            ctx.strokeRect(x1 - 5, y1 - 20, metrics.width + 10, 25);
                        } else if (obj.type === "triangle" || obj.type === "circle") {
                            const minX = Math.min(x1, x2);
                            const maxX = Math.max(x1, x2);
                            const minY = Math.min(y1, y2);
                            const maxY = Math.max(y1, y2);
                            ctx.strokeRect(minX, minY, maxX - minX, maxY - minY);
                        }
                        ctx.setLineDash([]);
                    }
                }
            });
        }
        
        /* ================= PERSISTENCE ================= */
        function saveDrawings() {
            try {
                const key = `chart_drawings_${SYMBOL}_${TIMEFRAME}`;
                localStorage.setItem(key, JSON.stringify(drawingObjects));
            } catch (e) {
                console.error('Failed to save drawings:', e);
            }
        }
        
        function loadDrawings() {
            try {
                const key = `chart_drawings_${SYMBOL}_${TIMEFRAME}`;
                const saved = localStorage.getItem(key);
                if (saved) {
                    drawingObjects = JSON.parse(saved);
                    draw();
                }
            } catch (e) {
                console.error('Failed to load drawings:', e);
                drawingObjects = [];
            }
        }
        
        /* ================= INDICATORS ================= */
        async function addMovingAverage() {
            const result = await showModal('Add Moving Average', [
                { id: 'type', label: 'Type (SMA/EMA)', value: 'SMA' },
                { id: 'period', label: 'Period', value: '20', type: 'number' },
                { id: 'color', label: 'Color', value: '#ffa500', type: 'color' }
            ]);
            
            if (!result) return;
            
            const upperType = result.type.toUpperCase();
            if (upperType !== 'SMA' && upperType !== 'EMA') {
                alert('Please enter SMA or EMA');
                return;
            }
            
            const period = parseInt(result.period);
            if (!period || period < 1) {
                alert('Please enter a valid period');
                return;
            }
            
            indicators.push({
                id: indicatorIdCounter++,
                type: 'ma',
                maType: upperType,
                params: { period },
                color: result.color || '#ffa500'
            });
            saveIndicators();
            updateIndicatorTags();
            draw();
        }
        
        function addIndicator(type) {
            const defaultParams = getDefaultParams(type);
            indicators.push({
                id: indicatorIdCounter++,
                type,
                color: getIndicatorColor(type),
                params: defaultParams
            });
            saveIndicators();
            updateIndicatorTags();
            draw();
        }
        
        function removeIndicator(id) {
            indicators = indicators.filter(ind => ind.id !== id);
            saveIndicators();
            updateIndicatorTags();
            draw();
        }
        
        function getDefaultParams(type) {
            const defaults = {
                bb: { period: 20, std: 2 },
                rsi: { period: 14 },
                macd: { fast: 12, slow: 26, signal: 9 },
                stoch: { k: 14, d: 3 },
                atr: { period: 14 }
            };
            return defaults[type] || {};
        }
        
        function updateIndicatorTags() {
            const container = document.getElementById("activeIndicators");
            container.innerHTML = "";
            indicators.forEach(ind => {
                const wrapper = document.createElement("span");
                wrapper.style.position = "relative";
                wrapper.style.display = "inline-block";
                
                const tag = document.createElement("span");
                tag.className = "indicator-tag";
                tag.textContent = getIndicatorDisplayName(ind);
                
                const menu = document.createElement("div");
                menu.className = "indicator-menu";
                menu.innerHTML = `
                    <div class="indicator-menu-item" data-action="settings">⚙️ Settings</div>
                    <div class="indicator-menu-item" data-action="color">🎨 Color</div>
                    <div class="indicator-menu-item" data-action="remove">🗑️ Remove</div>
                `;
                
                tag.onclick = (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.indicator-menu').forEach(m => m.classList.remove('show'));
                    menu.classList.toggle('show');
                };
                
                menu.onclick = (e) => {
                    e.stopPropagation();
                    const action = e.target.dataset.action;
                    if (action === 'remove') {
                        removeIndicator(ind.id);
                    } else if (action === 'settings') {
                        showIndicatorSettings(ind);
                    } else if (action === 'color') {
                        changeIndicatorColor(ind);
                    }
                    menu.classList.remove('show');
                };
                
                wrapper.appendChild(tag);
                wrapper.appendChild(menu);
                container.appendChild(wrapper);
            });
        }
        
        function getIndicatorDisplayName(ind) {
            if (ind.type === 'ma') {
                return `${ind.maType} ${ind.params.period}`;
            }
            const names = {
                bb: "BB", rsi: "RSI", macd: "MACD", stoch: "Stoch", atr: "ATR"
            };
            return names[ind.type] || ind.type;
        }
        
        async function showIndicatorSettings(ind) {
            const params = ind.params;
            
            if (ind.type === 'ma') {
                const result = await showModal('MA Settings', [
                    { id: 'type', label: 'Type (SMA/EMA)', value: ind.maType },
                    { id: 'period', label: 'Period', value: params.period, type: 'number' }
                ]);
                if (result) {
                    const upperType = result.type.toUpperCase();
                    if (upperType === 'SMA' || upperType === 'EMA') {
                        ind.maType = upperType;
                    }
                    const period = parseInt(result.period);
                    if (period && period > 0) {
                        params.period = period;
                    }
                }
            } else if (ind.type === 'bb') {
                const result = await showModal('Bollinger Bands Settings', [
                    { id: 'period', label: 'Period', value: params.period, type: 'number' },
                    { id: 'std', label: 'Std Dev', value: params.std, type: 'number' }
                ]);
                if (result) {

        function calculateSMA(data, period) {
            return data.map((_, i) => {
                if (i < period - 1) return null;
                const sum = data.slice(i - period + 1, i + 1).reduce((a, b) => a + b.close, 0);
                return sum / period;
            });
        }
        
        function calculateEMA(data, period) {
            const k = 2 / (period + 1);
            const ema = [data[0]?.close || 0];
            for (let i = 1; i < data.length; i++) {
                ema[i] = data[i].close * k + ema[i - 1] * (1 - k);
            }
            return ema;
        }
        
        function calculateBB(data, period = 20, std = 2) {
            const sma = calculateSMA(data, period);
            return data.map((_, i) => {
                if (i < period - 1) return null;
                const slice = data.slice(i - period + 1, i + 1);
                const mean = sma[i];
                const variance = slice.reduce((sum, c) => sum + Math.pow(c.close - mean, 2), 0) / period;
                const stdDev = Math.sqrt(variance);
                return {
                    upper: mean + stdDev * std,
                    middle: mean,
                    lower: mean - stdDev * std
                };
            });
        }
        
        function calculateRSI(data, period = 14) {
            const changes = data.slice(1).map((c, i) => c.close - data[i].close);
            const gains = changes.map(c => c > 0 ? c : 0);
            const losses = changes.map(c => c < 0 ? -c : 0);
            
            let avgGain = gains.slice(0, period).reduce((a, b) => a + b, 0) / period;
            let avgLoss = losses.slice(0, period).reduce((a, b) => a + b, 0) / period;
            
            const rsi = [null];
            for (let i = 0; i < period; i++) rsi.push(null);
            
            for (let i = period; i < changes.length; i++) {
                avgGain = (avgGain * (period - 1) + gains[i]) / period;
                avgLoss = (avgLoss * (period - 1) + losses[i]) / period;
                const rs = avgGain / (avgLoss || 0.001);
                rsi.push(100 - (100 / (1 + rs)));
            }
            return rsi;
        }
        
        function calculateMACD(data, fastPeriod = 12, slowPeriod = 26, signalPeriod = 9) {
            const prices = data.map(c => c.close);
            const fastEMA = calculateEMAFromPrices(prices, fastPeriod);
            const slowEMA = calculateEMAFromPrices(prices, slowPeriod);
            const macdLine = fastEMA.map((fast, i) => fast - slowEMA[i]);
            const signalLine = calculateEMAFromPrices(macdLine.filter(v => v !== null), signalPeriod);
            return { macd: macdLine, signal: signalLine };
        }
        
        function calculateEMAFromPrices(prices, period) {
            const k = 2 / (period + 1);
            const ema = [prices[0] || 0];
            for (let i = 1; i < prices.length; i++) {
                ema[i] = prices[i] * k + ema[i - 1] * (1 - k);
            }
            return ema;
        }
        
        function calculateStochastic(data, kPeriod = 14, dPeriod = 3) {
            const stochK = data.map((_, i) => {
                if (i < kPeriod - 1) return null;
                const slice = data.slice(i - kPeriod + 1, i + 1);
                const highest = Math.max(...slice.map(c => c.high));
                const lowest = Math.min(...slice.map(c => c.low));
                return ((data[i].close - lowest) / (highest - lowest)) * 100;
            });
            const stochD = stochK.filter(v => v !== null);
            const d = calculateSMAFromPrices(stochD, dPeriod);
            return { k: stochK, d };
        }
        
        function calculateSMAFromPrices(prices, period) {
            return prices.map((_, i) => {
                if (i < period - 1) return null;
                return prices.slice(i - period + 1, i + 1).reduce((a, b) => a + b, 0) / period;
            });
        }
        
        function calculateATR(data, period = 14) {
            const tr = data.slice(1).map((c, i) => {
                const prev = data[i];
                return Math.max(c.high - c.low, Math.abs(c.high - prev.close), Math.abs(c.low - prev.close));
            });
            const atr = [null];
            let sum = tr.slice(0, period).reduce((a, b) => a + b, 0);
            atr.push(sum / period);
            for (let i = period; i < tr.length; i++) {
                atr.push((atr[atr.length - 1] * (period - 1) + tr[i]) / period);
            }
            return atr;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let data = [...candles];
            if (currentCandle) data.push(currentCandle);
            
            if (isLoading || !data.length) {

            // Responsive padding based on screen size

            const pad = isMobile ? 40 : 70;
            const w = canvas.width - pad * 2;
            const h = canvas.height - pad * 2;

            // Responsive candle spacing
            const baseCandleSpacing = isMobile ? 4 : 6;
            const candleSpacing = baseCandleSpacing * zoom;
            const visible = Math.floor(w / candleSpacing);
            const start = Math.max(0, data.length - visible - Math.floor(offset));
            const view = data.slice(start, start + visible);

            const max = Math.max(...view.map(c => c.high));
            const min = Math.min(...view.map(c => c.low));
            const range = max - min || 1;
            const y = p => pad + h - ((p - min) / range) * h;

            // Grid
            ctx.strokeStyle = "#1f2430";
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const gy = pad + (h / 5) * i;
                ctx.beginPath();
                ctx.moveTo(pad, gy);
                ctx.lineTo(canvas.width - pad, gy);
                ctx.stroke();
            }

            // Draw candles
            drawChart(view, pad, candleSpacing, y, h);
            
            // Draw indicators
            if (indicators.length > 0) {
                const fullData = [...candles];
                if (currentCandle) fullData.push(currentCandle);
                
                indicators.forEach(ind => {
                    ctx.strokeStyle = ind.color;
                    ctx.lineWidth = 2;
                    
                    if (ind.type === 'ma') {
                        const ma = ind.maType === 'SMA' ? 
                            calculateSMA(fullData, ind.params.period) : 
                            calculateEMA(fullData, ind.params.period);
                        drawLine(ma.slice(start, start + visible), candleSpacing, y, pad);
                    }
                    else if (ind.type === 'bb') {
                        const bb = calculateBB(fullData, ind.params.period, ind.params.std);
                        drawBB(bb.slice(start, start + visible), candleSpacing, y, ind.color, pad);
                    }
                    else if (ind.type === 'rsi') {
                        const rsi = calculateRSI(fullData, ind.params.period);
                        drawRSI(rsi.slice(start, start + visible), candleSpacing, pad);
                    }
                    else if (ind.type === 'macd') {
                        const macd = calculateMACD(fullData, ind.params.fast, ind.params.slow, ind.params.signal);
                        drawMACD(macd, start, visible, candleSpacing, pad);
                    }
                    else if (ind.type === 'stoch') {
                        const stoch = calculateStochastic(fullData, ind.params.k, ind.params.d);
                        drawStoch(stoch, start, visible, candleSpacing, pad);
                    }
                    else if (ind.type === 'atr') {
                        const atr = calculateATR(fullData, ind.params.period);
                        drawATR(atr.slice(start, start + visible), candleSpacing, pad);
                    }
                    else if (ind.type.startsWith('custom_') && ind.custom) {
                        try {
                            const result = ind.custom.calculate(fullData, ind.params);
                            const visibleResult = Array.isArray(result) ? result.slice(start, start + visible) : result;
                            ind.custom.draw(ctx, visibleResult, pad, candleSpacing, y, ind.params);
                        } catch (error) {
                            console.error('Custom indicator error:', error);
                            indicators = indicators.filter(i => i.id !== ind.id);
                            updateIndicatorTags();

        function drawLine(values, spacing, yFunc, pad) {
            ctx.beginPath();
            let first = true;
            values.forEach((val, i) => {
                if (val === null || val === undefined) return;
                const x = pad + i * spacing + spacing / 2;
                if (first) {

                    first = false;

                }

        function drawBB(bb, spacing, yFunc, color, pad) {
            const alpha = ctx.globalAlpha;
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = color;
            
            ctx.beginPath();
            let hasData = false;
            bb.forEach((b, i) => {
                if (!b) return;
                const x = pad + i * spacing + spacing / 2;
                if (!hasData) {
                    ctx.moveTo(x, yFunc(b.upper));
                    hasData = true;
                } else {
                    ctx.lineTo(x, yFunc(b.upper));
                }
            });
            
            for (let i = bb.length - 1; i >= 0; i--) {
                const b = bb[i];
                if (!b) continue;
                const x = pad + i * spacing + spacing / 2;
                ctx.lineTo(x, yFunc(b.lower));
            }
            ctx.closePath();
            ctx.fill();
            
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = color;
            drawLine(bb.map(b => b?.middle), spacing, yFunc, pad);
        }

        function drawChart(view, pad, candleSpacing, yFunc, h) {
            switch (chartType) {
                case 'line':
                    ctx.setLineDash([]);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#00c176';
                    ctx.beginPath();
                    let started = false;
                    view.forEach((c, i) => {
                        const x = pad + i * candleSpacing + candleSpacing / 2;
                        const y = yFunc(c.close);
                        if (!started) {
                            ctx.moveTo(x, y);
                            started = true;
                        } else {
                            ctx.lineTo(x, y);
                        }
                    });
                    ctx.stroke();
                    break;
                    
                case 'area':
                    ctx.setLineDash([]);
                    ctx.lineWidth = 2;
                    const gradient = ctx.createLinearGradient(0, pad, 0, pad + h);
                    gradient.addColorStop(0, 'rgba(0, 193, 118, 0.3)');
                    gradient.addColorStop(1, 'rgba(0, 193, 118, 0.05)');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.moveTo(pad, pad + h);
                    view.forEach((c, i) => {
                        const x = pad + i * candleSpacing + candleSpacing / 2;
                        ctx.lineTo(x, yFunc(c.close));
                    });
                    ctx.lineTo(pad + (view.length - 1) * candleSpacing + candleSpacing / 2, pad + h);
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.strokeStyle = '#00c176';
                    ctx.beginPath();
                    view.forEach((c, i) => {
                        const x = pad + i * candleSpacing + candleSpacing / 2;
                        if (i === 0) ctx.moveTo(x, yFunc(c.close));
                        else ctx.lineTo(x, yFunc(c.close));
                    });
                    ctx.stroke();
                    break;
                    
                case 'bars':
                    ctx.setLineDash([]);
                    ctx.lineWidth = 1;
                    view.forEach((c, i) => {
                        const x = pad + i * candleSpacing + candleSpacing / 2;
                        const up = c.close >= c.open;
                        ctx.strokeStyle = up ? '#00c176' : '#ff4d4f';
                        
                        ctx.beginPath();
                        ctx.moveTo(x, yFunc(c.high));
                        ctx.lineTo(x, yFunc(c.low));
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(x - 3, yFunc(c.open));
                        ctx.lineTo(x, yFunc(c.open));
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(x, yFunc(c.close));
                        ctx.lineTo(x + 3, yFunc(c.close));
                        ctx.stroke();
                    });
                    break;
                    
                default:
                    view.forEach((c, i) => {
                        const x = pad + i * candleSpacing + candleSpacing / 2;
                        const up = c.close >= c.open;
                        ctx.setLineDash([]);
                        ctx.lineWidth = 1;
                        ctx.strokeStyle = ctx.fillStyle = up ? '#00c176' : '#ff4d4f';

                        ctx.beginPath();
                        ctx.moveTo(x, yFunc(c.high));
                        ctx.lineTo(x, yFunc(c.low));
                        ctx.stroke();

                        const bodyWidth = Math.max(2, candleSpacing * 0.6);
                        const bodyHeight = Math.max(1, Math.abs(yFunc(c.close) - yFunc(c.open)));
                        
                        ctx.fillRect(
                            x - bodyWidth / 2,
                            Math.min(yFunc(c.open), yFunc(c.close)),
                            bodyWidth,
                            bodyHeight
                        );
                    });
            }
        }
    </script>

</body>
