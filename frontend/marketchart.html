<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Charts | AlgoCDK - Live Trading Charts</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: #0e1117;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #d1d4dc;
        }

        #controls {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #161b22;
            border: 1px solid #2b2f3a;
            border-radius: 6px;
            padding: 8px;
            display: flex;
            gap: 10px;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        select {
            background: #0e1117;
            color: #d1d4dc;
            border: 1px solid #2b2f3a;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        select:focus {
            outline: none;
            border-color: #FF4500;
        }
        
        .indicator-tag {
            background: #2b2f3a;
            color: #d1d4dc;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            display: inline-block;
            margin: 2px;
            transition: all 0.2s ease;
        }
        
        .indicator-tag:hover {
            background: #FF4500;
            color: white;
        }

        canvas {
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        /* Brand Header */
        .brand-header {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #2b2f3a;
        }

        .brand-text {
            font-size: 18px;
            font-weight: bold;
        }
        
        .brand-text .brand-algo {
            color: #FF4500;
        }
        
        .brand-text .brand-cdk {
            color: white;
        }

        /* Navigation */
        .nav-links {
            position: fixed;
            bottom: 10px;
            left: 10px;
            z-index: 10;
            display: flex;
            gap: 8px;
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #2b2f3a;
        }

        .nav-link {
            color: #8b949e;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: #FF4500;
            background: rgba(255, 69, 0, 0.1);
        }

        .nav-link.active {
            color: #FF4500;
            background: rgba(255, 69, 0, 0.2);
        }

        /* Price Display */
        .price-display {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #2b2f3a;
            text-align: center;
        }

        .current-price {
            font-size: 18px;
            font-weight: bold;
            color: #d1d4dc;
            margin-bottom: 2px;
        }

        .price-change {
            font-size: 12px;
            font-weight: 500;
        }

        .price-up {
            color: #00c176;
        }

        .price-down {
            color: #ff4d4f;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            #controls {
                flex-wrap: wrap;
                max-width: calc(100vw - 20px);
                font-size: 14px;
                padding: 12px;
                gap: 12px;
            }
            
            select {
                padding: 8px 12px;
                font-size: 14px;
                min-height: 44px;
                min-width: 80px;
            }
            
            .brand-header {
                top: 5px;
                right: 5px;
                padding: 6px 10px;
            }
            
            .brand-text {
                font-size: 14px;
            }
            
            .price-display {
                top: 5px;
                padding: 6px 12px;
            }
            
            .current-price {
                font-size: 16px;
            }
            
            .price-change {
                font-size: 11px;
            }
            
            .nav-links {
                bottom: 5px;
                left: 5px;
                padding: 6px;
                gap: 6px;
            }
            
            .nav-link {
                padding: 8px 10px;
                font-size: 11px;
                min-height: 32px;
                display: flex;
                align-items: center;
            }
            
            .indicator-tag {
                padding: 4px 8px;
                font-size: 12px;
                margin: 1px;
                min-height: 32px;
                display: inline-flex;
                align-items: center;
            }
        }
        
        @media (max-width: 480px) {
            #controls {
                top: 5px;
                left: 5px;
                right: 5px;
                width: auto;
                max-width: none;
            }
            
            .price-display {
                left: 5px;
                right: 5px;
                width: auto;
                transform: none;
            }
            
            .nav-links {
                left: 5px;
                right: 5px;
                width: auto;
                justify-content: space-around;
            }
            
            .nav-link {
                flex: 1;
                text-align: center;
                padding: 6px 4px;
                font-size: 10px;
            }
        }
    </style>
</head>

<body>
    <!-- Brand Header -->
    <div class="brand-header">
        <div class="brand-text">
            <span class="brand-algo">Algo</span><span class="brand-cdk">cdk</span>
        </div>
    </div>

    <!-- Price Display -->
    <div class="price-display">
        <div class="current-price" id="currentPrice">--</div>
        <div class="price-change" id="priceChange">--</div>
    </div>

    <!-- Controls -->
    <div id="controls">
        <select id="symbol">
            <option value="R_50">Vol 50</option>
            <option value="R_75">Vol 75</option>
            <option value="R_100" selected>Vol 100</option>
            <option value="frxEURUSD">EUR/USD</option>
            <option value="cryBTCUSD">BTC/USD</option>
        </select>

        <select id="timeframe">
            <option value="10">10s</option>
            <option value="30">30s</option>
            <option value="60" selected>1m</option>
            <option value="300">5m</option>
        </select>
        
        <select id="indicators">
            <option value="">Add Indicator</option>
            <option value="sma20">SMA 20</option>
            <option value="sma50">SMA 50</option>
            <option value="sma100">SMA 100</option>
            <option value="ema20">EMA 20</option>
            <option value="ema50">EMA 50</option>
            <option value="bb">Bollinger Bands</option>
            <option value="rsi">RSI</option>
            <option value="macd">MACD</option>
            <option value="stoch">Stochastic</option>
            <option value="atr">ATR</option>
        </select>
        
        <select id="drawingTools">
            <option value="">Drawing Tools</option>
            <option value="text">Text Label</option>
            <option value="trendline">Trendline</option>
            <option value="ray">Ray</option>
            <option value="horizontal">Horizontal Line</option>
            <option value="vertical">Vertical Line</option>
            <option value="arrow">Arrow</option>
            <option value="rectangle">Rectangle</option>
            <option value="triangle">Triangle</option>
            <option value="circle">Circle</option>
            <option value="fibonacci">Fibonacci</option>
            <option value="fibext">Fib Extension</option>
            <option value="channel">Channel</option>
            <option value="pitchfork">Pitchfork</option>
            <option value="gann">Gann Fan</option>
        </select>
        
        <div id="activeIndicators"></div>
    </div>

    <!-- Navigation Links -->
    <div class="nav-links">
        <a href="app" class="nav-link">Dashboard</a>
        <a href="mybots" class="nav-link">My Bots</a>
        <a href="botstore" class="nav-link">Marketplace</a>
        <a href="marketchart" class="nav-link active">Charts</a>
        <a href="support" class="nav-link">Support</a>
    </div>

    <canvas id="chart"></canvas>

    <script>
        /* ================= CONFIG ================= */
        let SYMBOL = "R_100";
        let TIMEFRAME = 60;
        const MAX_CANDLES = 500;

        /* ================= STATE ================= */
        let candles = [];
        let currentCandle = null;
        let ws = null;
        let indicators = new Map();
        let drawingObjects = [];
        let selectedTool = null;
        let drawingInProgress = null;
        let selectedObject = null;
        let dragHandle = null;
        let dragStartX = 0;
        let dragStartY = 0;
        let objStartX1 = 0;
        let objStartY1 = 0;
        let objStartX2 = 0;
        let objStartY2 = 0;

        /* ================= VIEWPORT ================= */
        let zoom = 1;              // candle width multiplier
        let offset = 0;            // scroll offset (candles)
        let isDragging = false;
        let lastX = 0;

        /* ================= CANVAS ================= */
        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        /* ================= CONTROLS ================= */
        document.getElementById("symbol").onchange = e => {
            SYMBOL = e.target.value;
            restart();
        };

        document.getElementById("timeframe").onchange = e => {
            TIMEFRAME = +e.target.value;
            restart();
        };
        
        document.getElementById("indicators").onchange = e => {
            if (e.target.value) {
                addIndicator(e.target.value);
                e.target.value = "";
            }
        };
        
        document.getElementById("drawingTools").onchange = e => {
            if (e.target.value) {
                selectedTool = e.target.value;
                canvas.style.cursor = "crosshair";
                e.target.value = "";
            }
        };

        /* ================= WS ================= */
        function connect() {
            ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

            ws.onopen = () => {
                ws.send(JSON.stringify({
                    ticks_history: SYMBOL,
                    style: "candles",
                    granularity: TIMEFRAME,
                    count: MAX_CANDLES,
                    end: "latest"
                }));
                ws.send(JSON.stringify({ ticks: SYMBOL, subscribe: 1 }));
            };

            ws.onmessage = e => {
                const d = JSON.parse(e.data);
                if (d.error) return;

                if (d.candles) {
                    candles = d.candles.map(c => ({
                        time: Math.floor(c.epoch / TIMEFRAME) * TIMEFRAME,
                        open: +c.open,
                        high: +c.high,
                        low: +c.low,
                        close: +c.close
                    }));
                    currentCandle = null;
                    offset = 0;
                    draw();
                }

                if (d.tick) {
                    updateCandle(+d.tick.quote, d.tick.epoch);
                }
            };
        }

        function restart() {
            if (ws) ws.close();
            candles = [];
            currentCandle = null;
            zoom = 1;
            offset = 0;
            drawingObjects = [];
            selectedObject = null;
            connect();
            loadDrawings();
        }

        /* ================= CANDLE ENGINE ================= */
        function updateCandle(price, epoch) {
            const t = Math.floor(epoch / TIMEFRAME) * TIMEFRAME;

            if (!currentCandle || currentCandle.time !== t) {
                if (currentCandle) {
                    candles.push(currentCandle);
                    if (candles.length > MAX_CANDLES) candles.shift();
                }
                currentCandle = { time: t, open: price, high: price, low: price, close: price };
            } else {
                currentCandle.high = Math.max(currentCandle.high, price);
                currentCandle.low = Math.min(currentCandle.low, price);
                currentCandle.close = price;
            }
            
            // Update price display
            updatePriceDisplay(price);
            draw();
        }

        /* ================= PRICE DISPLAY ================= */
        function updatePriceDisplay(currentPrice) {
            const priceEl = document.getElementById('currentPrice');
            const changeEl = document.getElementById('priceChange');
            
            if (candles.length > 0) {
                const previousPrice = candles[candles.length - 1]?.close || currentPrice;
                const change = currentPrice - previousPrice;
                const changePercent = ((change / previousPrice) * 100).toFixed(2);
                
                priceEl.textContent = currentPrice.toFixed(5);
                changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(5)} (${change >= 0 ? '+' : ''}${changePercent}%)`;
                changeEl.className = `price-change ${change >= 0 ? 'price-up' : 'price-down'}`;
            } else {
                priceEl.textContent = currentPrice.toFixed(5);
                changeEl.textContent = '--';
            }
        }

        /* ================= INTERACTION ================= */
        // Mouse interaction
        canvas.addEventListener("mousedown", e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (selectedTool) {
                startDrawing(x, y);
            } else {
                const clicked = findObjectAt(x, y);
                if (clicked) {
                    selectedObject = clicked;
                    dragHandle = findHandle(clicked, x, y);
                    dragStartX = x;
                    dragStartY = y;
                    objStartX1 = clicked.x1;
                    objStartY1 = clicked.y1;
                    objStartX2 = clicked.x2;
                    objStartY2 = clicked.y2;
                    canvas.style.cursor = "move";
                    draw();
                } else {
                    selectedObject = null;
                    isDragging = true;
                    lastX = e.clientX;
                }
            }
        });
        
        window.addEventListener("mouseup", e => {
            if (drawingInProgress) {
                finishDrawing();
            }
            isDragging = false;
            dragHandle = null;
            if (!selectedObject) {
                canvas.style.cursor = "grab";
            }
        });
        
        window.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (drawingInProgress) {
                updateDrawing(x, y);
                draw();
            } else if (selectedObject && dragHandle) {
                updateObjectHandle(selectedObject, dragHandle, x, y);
                draw();
            } else if (isDragging) {
                offset += (e.clientX - lastX) / 10;
                lastX = e.clientX;
                draw();
            } else {
                const obj = findObjectAt(x, y);
                if (obj) {
                    const handle = findHandle(obj, x, y);
                    canvas.style.cursor = handle === "move" ? "move" : "nwse-resize";
                } else {
                    canvas.style.cursor = selectedTool ? "crosshair" : "grab";
                }
            }
        });

        // Touch interaction for mobile
        canvas.addEventListener("touchstart", e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            const y = e.touches[0].clientY - rect.top;
            
            if (e.touches.length === 1) {
                if (selectedTool) {
                    startDrawing(x, y);
                } else {
                    const clicked = findObjectAt(x, y);
                    if (clicked) {
                        selectedObject = clicked;
                        dragHandle = findHandle(clicked, x, y);
                        dragStartX = x;
                        dragStartY = y;
                        objStartX1 = clicked.x1;
                        objStartY1 = clicked.y1;
                        objStartX2 = clicked.x2;
                        objStartY2 = clicked.y2;
                        draw();
                    } else {
                        selectedObject = null;
                        isDragging = true;
                        lastX = e.touches[0].clientX;
                    }
                }
            }
        });
        
        canvas.addEventListener("touchmove", e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            const y = e.touches[0].clientY - rect.top;
            
            if (e.touches.length === 1) {
                if (drawingInProgress) {
                    updateDrawing(x, y);
                    draw();
                } else if (selectedObject && dragHandle) {
                    updateObjectHandle(selectedObject, dragHandle, x, y);
                    draw();
                } else if (isDragging) {
                    offset += (e.touches[0].clientX - lastX) / 10;
                    lastX = e.touches[0].clientX;
                    draw();
                }
            } else if (e.touches.length === 2) {
                // Pinch zoom
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];
                const distance = Math.sqrt(
                    Math.pow(touch2.clientX - touch1.clientX, 2) + 
                    Math.pow(touch2.clientY - touch1.clientY, 2)
                );
                
                if (window.lastTouchDistance) {
                    const delta = distance - window.lastTouchDistance;
                    zoom += delta * 0.01;
                    zoom = Math.max(0.5, Math.min(3, zoom));
                    draw();
                }
                window.lastTouchDistance = distance;
            }
        });
        
        canvas.addEventListener("touchend", e => {
            e.preventDefault();
            if (drawingInProgress) {
                finishDrawing();
            }
            isDragging = false;
            dragHandle = null;
            window.lastTouchDistance = null;
        });

        // Zoom (wheel)
        canvas.addEventListener("wheel", e => {
            e.preventDefault();
            zoom += e.deltaY * -0.001;
            zoom = Math.max(0.5, Math.min(3, zoom));
            draw();
        });
        
        // Delete selected object
        window.addEventListener("keydown", e => {
            if ((e.key === "Delete" || e.key === "Backspace") && selectedObject) {
                drawingObjects = drawingObjects.filter(obj => obj !== selectedObject);
                selectedObject = null;
                saveDrawings();
                draw();
            } else if (e.key === "Escape") {
                selectedTool = null;
                selectedObject = null;
                canvas.style.cursor = "grab";
                draw();
            }
        });

        /* ================= DRAWING TOOLS ================= */
        function startDrawing(x, y) {
            const obj = { type: selectedTool, x1: x, y1: y, x2: x, y2: y, color: "#FF4500" };
            if (selectedTool === "text") {
                obj.text = prompt("Enter text:") || "Text";
            }
            drawingInProgress = obj;
        }
        
        function updateDrawing(x, y) {
            if (drawingInProgress) {
                drawingInProgress.x2 = x;
                drawingInProgress.y2 = y;
            }
        }
        
        function finishDrawing() {
            if (drawingInProgress) {
                drawingObjects.push(drawingInProgress);
                saveDrawings();
                drawingInProgress = null;
                selectedTool = null;
                canvas.style.cursor = "grab";
            }
        }
        
        function findObjectAt(x, y) {
            for (let i = drawingObjects.length - 1; i >= 0; i--) {
                const obj = drawingObjects[i];
                if (isPointNearObject(obj, x, y)) return obj;
            }
            return null;
        }
        
        function isPointNearObject(obj, x, y, threshold = 15) {
            if (obj.type === "trendline" || obj.type === "ray" || obj.type === "arrow") {
                return distanceToLine(x, y, obj.x1, obj.y1, obj.x2, obj.y2) < threshold;
            } else if (obj.type === "horizontal") {
                return Math.abs(y - obj.y1) < threshold;
            } else if (obj.type === "vertical") {
                return Math.abs(x - obj.x1) < threshold;
            } else if (obj.type === "rectangle") {
                const minX = Math.min(obj.x1, obj.x2);
                const maxX = Math.max(obj.x1, obj.x2);
                const minY = Math.min(obj.y1, obj.y2);
                const maxY = Math.max(obj.y1, obj.y2);
                const onBorder = (
                    (Math.abs(x - minX) < threshold && y >= minY && y <= maxY) ||
                    (Math.abs(x - maxX) < threshold && y >= minY && y <= maxY) ||
                    (Math.abs(y - minY) < threshold && x >= minX && x <= maxX) ||
                    (Math.abs(y - maxY) < threshold && x >= minX && x <= maxX)
                );
                const inside = x >= minX && x <= maxX && y >= minY && y <= maxY;
                return onBorder || inside;
            } else if (obj.type === "triangle") {
                const midX = (obj.x1 + obj.x2) / 2;
                return distanceToLine(x, y, midX, obj.y1, obj.x1, obj.y2) < threshold ||
                       distanceToLine(x, y, obj.x1, obj.y2, obj.x2, obj.y2) < threshold ||
                       distanceToLine(x, y, obj.x2, obj.y2, midX, obj.y1) < threshold;
            } else if (obj.type === "circle") {
                const radius = Math.abs(obj.x2 - obj.x1) / 2;
                const centerX = (obj.x1 + obj.x2) / 2;
                const centerY = (obj.y1 + obj.y2) / 2;
                const dist = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));
                return Math.abs(dist - radius) < threshold;
            } else if (obj.type === "fibonacci" || obj.type === "fibext" || obj.type === "channel" || obj.type === "pitchfork" || obj.type === "gann") {
                const minX = Math.min(obj.x1, obj.x2);
                const maxX = Math.max(obj.x1, obj.x2);
                const minY = Math.min(obj.y1, obj.y2);
                const maxY = Math.max(obj.y1, obj.y2);
                return x >= minX - threshold && x <= maxX + threshold && y >= minY - threshold && y <= maxY + threshold;
            } else if (obj.type === "text") {
                ctx.font = "14px Arial";
                const metrics = ctx.measureText(obj.text || "Text");
                return x >= obj.x1 - 5 && x <= obj.x1 + metrics.width + 5 && 
                       y >= obj.y1 - 20 && y <= obj.y1 + 5;
            }
            return false;
        }
        
        function distanceToLine(px, py, x1, y1, x2, y2) {
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;
            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            let param = -1;
            if (lenSq !== 0) param = dot / lenSq;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            const dx = px - xx;
            const dy = py - yy;
            return Math.sqrt(dx * dx + dy * dy);
        }
        
        function findHandle(obj, x, y) {
            const threshold = 15;
            if (Math.abs(x - obj.x1) < threshold && Math.abs(y - obj.y1) < threshold) return "start";
            if (Math.abs(x - obj.x2) < threshold && Math.abs(y - obj.y2) < threshold) return "end";
            return "move";
        }
        
        function updateObjectHandle(obj, handle, x, y) {
            if (handle === "start") {
                obj.x1 = x;
                obj.y1 = y;
                if (obj.type === "horizontal") {
                    obj.y2 = y;
                }
            } else if (handle === "end") {
                obj.x2 = x;
                obj.y2 = y;
                if (obj.type === "horizontal") {
                    obj.y1 = y;
                }
            } else if (handle === "move") {
                const dx = x - dragStartX;
                const dy = y - dragStartY;
                obj.x1 = objStartX1 + dx;
                obj.y1 = objStartY1 + dy;
                obj.x2 = objStartX2 + dx;
                obj.y2 = objStartY2 + dy;
            }
            saveDrawings();
        }
        
        function drawObjects() {
            [...drawingObjects, drawingInProgress].filter(Boolean).forEach(obj => {
                ctx.strokeStyle = obj.color;
                ctx.fillStyle = obj.color;
                ctx.lineWidth = 2;
                
                if (obj.type === "trendline") {
                    ctx.beginPath();
                    ctx.moveTo(obj.x1, obj.y1);
                    ctx.lineTo(obj.x2, obj.y2);
                    ctx.stroke();
                } else if (obj.type === "ray") {
                    const dx = obj.x2 - obj.x1;
                    const dy = obj.y2 - obj.y1;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    if (length > 0) {
                        const extendX = obj.x1 + (dx / length) * canvas.width;
                        const extendY = obj.y1 + (dy / length) * canvas.width;
                        ctx.beginPath();
                        ctx.moveTo(obj.x1, obj.y1);
                        ctx.lineTo(extendX, extendY);
                        ctx.stroke();
                    }
                } else if (obj.type === "horizontal") {
                    ctx.beginPath();
                    ctx.moveTo(0, obj.y1);
                    ctx.lineTo(canvas.width, obj.y1);
                    ctx.stroke();
                } else if (obj.type === "vertical") {
                    ctx.beginPath();
                    ctx.moveTo(obj.x1, 0);
                    ctx.lineTo(obj.x1, canvas.height);
                    ctx.stroke();
                } else if (obj.type === "arrow") {
                    ctx.beginPath();
                    ctx.moveTo(obj.x1, obj.y1);
                    ctx.lineTo(obj.x2, obj.y2);
                    ctx.stroke();
                    const angle = Math.atan2(obj.y2 - obj.y1, obj.x2 - obj.x1);
                    const headLength = 15;
                    ctx.beginPath();
                    ctx.moveTo(obj.x2, obj.y2);
                    ctx.lineTo(obj.x2 - headLength * Math.cos(angle - Math.PI / 6), obj.y2 - headLength * Math.sin(angle - Math.PI / 6));
                    ctx.moveTo(obj.x2, obj.y2);
                    ctx.lineTo(obj.x2 - headLength * Math.cos(angle + Math.PI / 6), obj.y2 - headLength * Math.sin(angle + Math.PI / 6));
                    ctx.stroke();
                } else if (obj.type === "rectangle") {
                    ctx.strokeRect(obj.x1, obj.y1, obj.x2 - obj.x1, obj.y2 - obj.y1);
                } else if (obj.type === "triangle") {
                    const midX = (obj.x1 + obj.x2) / 2;
                    ctx.beginPath();
                    ctx.moveTo(midX, obj.y1);
                    ctx.lineTo(obj.x1, obj.y2);
                    ctx.lineTo(obj.x2, obj.y2);
                    ctx.closePath();
                    ctx.stroke();
                } else if (obj.type === "circle") {
                    const radius = Math.abs(obj.x2 - obj.x1) / 2;
                    const centerX = (obj.x1 + obj.x2) / 2;
                    const centerY = (obj.y1 + obj.y2) / 2;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                    ctx.stroke();
                } else if (obj.type === "fibonacci") {
                    const levels = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1];
                    const height = obj.y2 - obj.y1;
                    levels.forEach(level => {
                        const y = obj.y1 + height * level;
                        ctx.globalAlpha = 0.7;
                        ctx.beginPath();
                        ctx.moveTo(Math.min(obj.x1, obj.x2), y);
                        ctx.lineTo(Math.max(obj.x1, obj.x2), y);
                        ctx.stroke();
                        ctx.fillText(`${(level * 100).toFixed(1)}%`, Math.min(obj.x1, obj.x2) + 5, y - 5);
                    });
                    ctx.globalAlpha = 1;
                } else if (obj.type === "fibext") {
                    const levels = [0, 0.618, 1, 1.272, 1.618, 2.618];
                    const height = obj.y2 - obj.y1;
                    levels.forEach(level => {
                        const y = obj.y1 + height * level;
                        ctx.globalAlpha = 0.7;
                        ctx.beginPath();
                        ctx.moveTo(Math.min(obj.x1, obj.x2), y);
                        ctx.lineTo(Math.max(obj.x1, obj.x2), y);
                        ctx.stroke();
                        ctx.fillText(`${(level * 100).toFixed(1)}%`, Math.min(obj.x1, obj.x2) + 5, y - 5);
                    });
                    ctx.globalAlpha = 1;
                } else if (obj.type === "channel") {
                    ctx.beginPath();
                    ctx.moveTo(obj.x1, obj.y1);
                    ctx.lineTo(obj.x2, obj.y2);
                    ctx.stroke();
                    const offset = (obj.y2 - obj.y1) * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(obj.x1, obj.y1 + offset);
                    ctx.lineTo(obj.x2, obj.y2 + offset);
                    ctx.stroke();
                } else if (obj.type === "pitchfork") {
                    ctx.beginPath();
                    ctx.moveTo(obj.x1, obj.y1);
                    ctx.lineTo(obj.x2, obj.y2);
                    ctx.stroke();
                    const diff = (obj.y2 - obj.y1) * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(obj.x1, obj.y1 - diff);
                    ctx.lineTo(obj.x2, obj.y2 - diff);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(obj.x1, obj.y1 + diff);
                    ctx.lineTo(obj.x2, obj.y2 + diff);
                    ctx.stroke();
                } else if (obj.type === "gann") {
                    const angles = [15, 30, 45, 60, 75];
                    const length = 200;
                    angles.forEach(angle => {
                        const radians = (angle * Math.PI) / 180;
                        ctx.globalAlpha = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(obj.x1, obj.y1);
                        ctx.lineTo(obj.x1 + length * Math.cos(radians), obj.y1 - length * Math.sin(radians));
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(obj.x1, obj.y1);
                        ctx.lineTo(obj.x1 + length * Math.cos(-radians), obj.y1 - length * Math.sin(-radians));
                        ctx.stroke();
                    });
                    ctx.globalAlpha = 1;
                } else if (obj.type === "text") {
                    ctx.font = "14px Arial";
                    ctx.fillText(obj.text, obj.x1, obj.y1);
                }
                
                if (obj === selectedObject) {
                    ctx.fillStyle = "#00FF00";
                    ctx.strokeStyle = "#FFFFFF";
                    ctx.lineWidth = 2;
                    
                    // Draw handles for all types
                    ctx.beginPath();
                    ctx.arc(obj.x1, obj.y1, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    
                    if (obj.type !== "horizontal" && obj.type !== "vertical") {
                        ctx.beginPath();
                        ctx.arc(obj.x2, obj.y2, 6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                    }
                    
                    // Draw selection box for complex shapes
                    if (obj.type === "rectangle" || obj.type === "text" || obj.type === "triangle" || obj.type === "circle") {
                        ctx.strokeStyle = "#00FF00";
                        ctx.lineWidth = 1;
                        ctx.setLineDash([5, 5]);
                        if (obj.type === "rectangle") {
                            ctx.strokeRect(obj.x1, obj.y1, obj.x2 - obj.x1, obj.y2 - obj.y1);
                        } else if (obj.type === "text") {
                            ctx.font = "14px Arial";
                            const metrics = ctx.measureText(obj.text);
                            ctx.strokeRect(obj.x1 - 5, obj.y1 - 20, metrics.width + 10, 25);
                        } else if (obj.type === "triangle" || obj.type === "circle") {
                            const minX = Math.min(obj.x1, obj.x2);
                            const maxX = Math.max(obj.x1, obj.x2);
                            const minY = Math.min(obj.y1, obj.y2);
                            const maxY = Math.max(obj.y1, obj.y2);
                            ctx.strokeRect(minX, minY, maxX - minX, maxY - minY);
                        }
                        ctx.setLineDash([]);
                    }
                }
            });
        }
        
        /* ================= PERSISTENCE ================= */
        function saveDrawings() {
            try {
                const key = `chart_drawings_${SYMBOL}_${TIMEFRAME}`;
                localStorage.setItem(key, JSON.stringify(drawingObjects));
            } catch (e) {
                console.error('Failed to save drawings:', e);
            }
        }
        
        function loadDrawings() {
            try {
                const key = `chart_drawings_${SYMBOL}_${TIMEFRAME}`;
                const saved = localStorage.getItem(key);
                if (saved) {
                    drawingObjects = JSON.parse(saved);
                    draw();
                }
            } catch (e) {
                console.error('Failed to load drawings:', e);
                drawingObjects = [];
            }
        }
        
        /* ================= INDICATORS ================= */
        function addIndicator(type) {
            if (indicators.has(type)) return;
            indicators.set(type, { type, color: getIndicatorColor(type) });
            updateIndicatorTags();
            draw();
        }
        
        function removeIndicator(type) {
            indicators.delete(type);
            updateIndicatorTags();
            draw();
        }
        
        function updateIndicatorTags() {
            const container = document.getElementById("activeIndicators");
            container.innerHTML = "";
            indicators.forEach((ind, type) => {
                const tag = document.createElement("span");
                tag.className = "indicator-tag";
                tag.textContent = getIndicatorName(type);
                tag.onclick = () => removeIndicator(type);
                container.appendChild(tag);
            });
        }
        
        function getIndicatorName(type) {
            const names = {
                sma20: "SMA 20", sma50: "SMA 50", sma100: "SMA 100",
                ema20: "EMA 20", ema50: "EMA 50",
                bb: "BB", rsi: "RSI", macd: "MACD", stoch: "Stoch", atr: "ATR"
            };
            return names[type] || type;
        }
        
        function getIndicatorColor(type) {
            const colors = {
                sma20: "#ffa500", sma50: "#00bfff", sma100: "#ff00ff",
                ema20: "#ff69b4", ema50: "#00ff00",
                bb: "#9370db", rsi: "#32cd32", macd: "#ffff00", stoch: "#00ffff", atr: "#ff6347"
            };
            return colors[type] || "#ffffff";
        }
        
        function calculateSMA(data, period) {
            return data.map((_, i) => {
                if (i < period - 1) return null;
                const sum = data.slice(i - period + 1, i + 1).reduce((a, b) => a + b.close, 0);
                return sum / period;
            });
        }
        
        function calculateEMA(data, period) {
            const k = 2 / (period + 1);
            const ema = [data[0]?.close || 0];
            for (let i = 1; i < data.length; i++) {
                ema[i] = data[i].close * k + ema[i - 1] * (1 - k);
            }
            return ema;
        }
        
        function calculateBB(data, period = 20, std = 2) {
            const sma = calculateSMA(data, period);
            return data.map((_, i) => {
                if (i < period - 1) return null;
                const slice = data.slice(i - period + 1, i + 1);
                const mean = sma[i];
                const variance = slice.reduce((sum, c) => sum + Math.pow(c.close - mean, 2), 0) / period;
                const stdDev = Math.sqrt(variance);
                return {
                    upper: mean + stdDev * std,
                    middle: mean,
                    lower: mean - stdDev * std
                };
            });
        }
        
        function calculateRSI(data, period = 14) {
            const changes = data.slice(1).map((c, i) => c.close - data[i].close);
            const gains = changes.map(c => c > 0 ? c : 0);
            const losses = changes.map(c => c < 0 ? -c : 0);
            
            let avgGain = gains.slice(0, period).reduce((a, b) => a + b, 0) / period;
            let avgLoss = losses.slice(0, period).reduce((a, b) => a + b, 0) / period;
            
            const rsi = [null];
            for (let i = 0; i < period; i++) rsi.push(null);
            
            for (let i = period; i < changes.length; i++) {
                avgGain = (avgGain * (period - 1) + gains[i]) / period;
                avgLoss = (avgLoss * (period - 1) + losses[i]) / period;
                const rs = avgGain / (avgLoss || 0.001);
                rsi.push(100 - (100 / (1 + rs)));
            }
            return rsi;
        }
        
        function calculateMACD(data, fastPeriod = 12, slowPeriod = 26, signalPeriod = 9) {
            const prices = data.map(c => c.close);
            const fastEMA = calculateEMAFromPrices(prices, fastPeriod);
            const slowEMA = calculateEMAFromPrices(prices, slowPeriod);
            const macdLine = fastEMA.map((fast, i) => fast - slowEMA[i]);
            const signalLine = calculateEMAFromPrices(macdLine.filter(v => v !== null), signalPeriod);
            return { macd: macdLine, signal: signalLine };
        }
        
        function calculateEMAFromPrices(prices, period) {
            const k = 2 / (period + 1);
            const ema = [prices[0] || 0];
            for (let i = 1; i < prices.length; i++) {
                ema[i] = prices[i] * k + ema[i - 1] * (1 - k);
            }
            return ema;
        }
        
        function calculateStochastic(data, kPeriod = 14, dPeriod = 3) {
            const stochK = data.map((_, i) => {
                if (i < kPeriod - 1) return null;
                const slice = data.slice(i - kPeriod + 1, i + 1);
                const highest = Math.max(...slice.map(c => c.high));
                const lowest = Math.min(...slice.map(c => c.low));
                return ((data[i].close - lowest) / (highest - lowest)) * 100;
            });
            const stochD = stochK.filter(v => v !== null);
            const d = calculateSMAFromPrices(stochD, dPeriod);
            return { k: stochK, d };
        }
        
        function calculateSMAFromPrices(prices, period) {
            return prices.map((_, i) => {
                if (i < period - 1) return null;
                return prices.slice(i - period + 1, i + 1).reduce((a, b) => a + b, 0) / period;
            });
        }
        
        function calculateATR(data, period = 14) {
            const tr = data.slice(1).map((c, i) => {
                const prev = data[i];
                return Math.max(c.high - c.low, Math.abs(c.high - prev.close), Math.abs(c.low - prev.close));
            });
            const atr = [null];
            let sum = tr.slice(0, period).reduce((a, b) => a + b, 0);
            atr.push(sum / period);
            for (let i = period; i < tr.length; i++) {
                atr.push((atr[atr.length - 1] * (period - 1) + tr[i]) / period);
            }
            return atr;
        }
        
        /* ================= DRAW ================= */
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let data = [...candles];
            if (currentCandle) data.push(currentCandle);
            if (!data.length) return;

            // Responsive padding based on screen size
            const isMobile = window.innerWidth <= 768;
            const pad = isMobile ? 40 : 70;
            const w = canvas.width - pad * 2;
            const h = canvas.height - pad * 2;

            // Responsive candle spacing
            const baseCandleSpacing = isMobile ? 4 : 6;
            const candleSpacing = baseCandleSpacing * zoom;
            const visible = Math.floor(w / candleSpacing);
            const start = Math.max(0, data.length - visible - Math.floor(offset));
            const view = data.slice(start, start + visible);

            const max = Math.max(...view.map(c => c.high));
            const min = Math.min(...view.map(c => c.low));
            const range = max - min || 1;
            const y = p => pad + h - ((p - min) / range) * h;

            // Grid
            ctx.strokeStyle = "#1f2430";
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const gy = pad + (h / 5) * i;
                ctx.beginPath();
                ctx.moveTo(pad, gy);
                ctx.lineTo(canvas.width - pad, gy);
                ctx.stroke();
            }

            // Draw candles
            view.forEach((c, i) => {
                const x = pad + i * candleSpacing + candleSpacing / 2;
                const up = c.close >= c.open;
                ctx.strokeStyle = ctx.fillStyle = up ? "#00c176" : "#ff4d4f";
                ctx.lineWidth = 1;

                // Wick
                ctx.beginPath();
                ctx.moveTo(x, y(c.high));
                ctx.lineTo(x, y(c.low));
                ctx.stroke();

                // Body
                ctx.fillRect(
                    x - candleSpacing * 0.3,
                    Math.min(y(c.open), y(c.close)),
                    candleSpacing * 0.6,
                    Math.max(1, Math.abs(y(c.close) - y(c.open)))
                );
            });
            
            // Draw indicators
            if (indicators.size > 0) {
                const fullData = [...candles];
                if (currentCandle) fullData.push(currentCandle);
                
                indicators.forEach((ind, type) => {
                    ctx.strokeStyle = ind.color;
                    ctx.lineWidth = 2;
                    
                    if (type === 'sma20') {
                        const sma = calculateSMA(fullData, 20);
                        drawLine(sma.slice(start, start + visible), candleSpacing, y, pad);
                    }
                    else if (type === 'sma50') {
                        const sma = calculateSMA(fullData, 50);
                        drawLine(sma.slice(start, start + visible), candleSpacing, y, pad);
                    }
                    else if (type === 'sma100') {
                        const sma = calculateSMA(fullData, 100);
                        drawLine(sma.slice(start, start + visible), candleSpacing, y, pad);
                    }
                    else if (type === 'ema20') {
                        const ema = calculateEMA(fullData, 20);
                        drawLine(ema.slice(start, start + visible), candleSpacing, y, pad);
                    }
                    else if (type === 'ema50') {
                        const ema = calculateEMA(fullData, 50);
                        drawLine(ema.slice(start, start + visible), candleSpacing, y, pad);
                    }
                    else if (type === 'bb') {
                        const bb = calculateBB(fullData);
                        drawBB(bb.slice(start, start + visible), candleSpacing, y, ind.color, pad);
                    }
                    else if (type === 'rsi') {
                        const rsi = calculateRSI(fullData);
                        drawRSI(rsi.slice(start, start + visible), candleSpacing, pad);
                    }
                    else if (type === 'macd') {
                        const macd = calculateMACD(fullData);
                        drawMACD(macd, start, visible, candleSpacing, pad);
                    }
                    else if (type === 'stoch') {
                        const stoch = calculateStochastic(fullData);
                        drawStoch(stoch, start, visible, candleSpacing, pad);
                    }
                    else if (type === 'atr') {
                        const atr = calculateATR(fullData);
                        drawATR(atr.slice(start, start + visible), candleSpacing, pad);
                    }
                });
            }

            // Draw price labels
            drawPriceLabels(min, max, range, pad, h);
            
            // Draw drawing objects
            drawObjects();
        }
        
        function drawLine(values, spacing, yFunc, pad) {
            ctx.beginPath();
            let first = true;
            values.forEach((val, i) => {
                if (val === null || val === undefined) return;
                const x = pad + i * spacing + spacing / 2;
                if (first) {
                    ctx.moveTo(x, yFunc(val));
                    first = false;
                } else {
                    ctx.lineTo(x, yFunc(val));
                }
            });
            ctx.stroke();
        }
        
        function drawBB(bb, spacing, yFunc, color, pad) {
            const alpha = ctx.globalAlpha;
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = color;
            
            ctx.beginPath();
            let hasData = false;
            bb.forEach((b, i) => {
                if (!b) return;
                const x = pad + i * spacing + spacing / 2;
                if (!hasData) {
                    ctx.moveTo(x, yFunc(b.upper));
                    hasData = true;
                } else {
                    ctx.lineTo(x, yFunc(b.upper));
                }
            });
            
            for (let i = bb.length - 1; i >= 0; i--) {
                const b = bb[i];
                if (!b) continue;
                const x = pad + i * spacing + spacing / 2;
                ctx.lineTo(x, yFunc(b.lower));
            }
            ctx.closePath();
            ctx.fill();
            
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = color;
            drawLine(bb.map(b => b?.middle), spacing, yFunc, pad);
        }
        
        function drawRSI(rsi, spacing, pad) {
            const rsiH = 60;
            const rsiY = canvas.height - rsiH - 10;
            
            ctx.fillStyle = "#161b22";
            ctx.fillRect(pad, rsiY, canvas.width - pad * 2, rsiH);
            
            ctx.strokeStyle = "#1f2430";
            ctx.lineWidth = 1;
            [30, 50, 70].forEach(level => {
                const y = rsiY + rsiH - (level / 100) * rsiH;
                ctx.beginPath();
                ctx.moveTo(pad, y);
                ctx.lineTo(canvas.width - pad, y);
                ctx.stroke();
            });
            
            ctx.strokeStyle = "#32cd32";
            ctx.lineWidth = 2;
            ctx.beginPath();
            let first = true;
            rsi.forEach((val, i) => {
                if (val === null || val === undefined) return;
                const x = pad + i * spacing + spacing / 2;
                const y = rsiY + rsiH - (val / 100) * rsiH;
                if (first) {
                    ctx.moveTo(x, y);
                    first = false;
                } else {
                    ctx.lineTo(x, y);
                }
            });
            ctx.stroke();
            
            ctx.fillStyle = "#d1d4dc";
            ctx.font = "10px Arial";
            ctx.fillText("RSI", pad + 5, rsiY + 12);
        }
        
        function drawMACD(macd, start, visible, spacing, pad) {
            const h = 60;
            const y = canvas.height - h - 10;
            ctx.fillStyle = "#161b22";
            ctx.fillRect(pad, y, canvas.width - pad * 2, h);
            const visibleMacd = macd.macd.slice(start, start + visible);
            const visibleSignal = macd.signal.slice(start, start + visible);
            ctx.strokeStyle = "#ffff00";
            ctx.lineWidth = 2;
            ctx.beginPath();
            visibleMacd.forEach((val, i) => {
                if (val) {
                    const x = pad + i * spacing + spacing / 2;
                    const py = y + h / 2 - val * 10;
                    i === 0 ? ctx.moveTo(x, py) : ctx.lineTo(x, py);
                }
            });
            ctx.stroke();
        }
        
        function drawStoch(stoch, start, visible, spacing, pad) {
            const h = 60;
            const y = canvas.height - h - 10;
            ctx.fillStyle = "#161b22";
            ctx.fillRect(pad, y, canvas.width - pad * 2, h);
            const visibleK = stoch.k.slice(start, start + visible);
            ctx.strokeStyle = "#00ffff";
            ctx.lineWidth = 2;
            ctx.beginPath();
            visibleK.forEach((val, i) => {
                if (val !== null) {
                    const x = pad + i * spacing + spacing / 2;
                    const py = y + h - (val / 100) * h;
                    i === 0 ? ctx.moveTo(x, py) : ctx.lineTo(x, py);
                }
            });
            ctx.stroke();
        }
        
        function drawATR(atr, spacing, pad) {
            const h = 60;
            const y = canvas.height - h - 10;
            ctx.fillStyle = "#161b22";
            ctx.fillRect(pad, y, canvas.width - pad * 2, h);
            ctx.strokeStyle = "#ff6347";
            ctx.lineWidth = 2;
            ctx.beginPath();
            atr.forEach((val, i) => {
                if (val) {
                    const x = pad + i * spacing + spacing / 2;
                    const py = y + h - val * 10;
                    i === 0 ? ctx.moveTo(x, py) : ctx.lineTo(x, py);
                }
            });
            ctx.stroke();
        }

        function drawPriceLabels(min, max, range, pad, h) {
            const isMobile = window.innerWidth <= 768;
            ctx.fillStyle = "#8b949e";
            ctx.font = isMobile ? "9px Arial" : "11px Arial";
            ctx.textAlign = "right";
            
            const labelCount = isMobile ? 3 : 5;
            for (let i = 0; i <= labelCount; i++) {
                const price = min + (range * i / labelCount);
                const y = pad + h - (i * h / labelCount);
                const decimals = isMobile ? 3 : 5;
                ctx.fillText(price.toFixed(decimals), canvas.width - pad + 5, y + 4);
            }
            
            ctx.textAlign = "left";
        }

        /* ================= START ================= */
        connect();
        loadDrawings();
    </script>
