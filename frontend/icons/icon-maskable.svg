<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>
  
  <!-- Chart line -->
  <polyline points="60,380 140,300 200,340 260,220 320,260 380,160 440,180" 
            fill="none" stroke="#0A0E1A" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Candlestick 1 -->
  <rect x="120" y="320" width="24" height="60" fill="#0A0E1A" rx="2"/>
  <line x1="132" y1="300" x2="132" y2="340" stroke="#0A0E1A" stroke-width="8"/>
  <line x1="132" y1="360" x2="132" y2="380" stroke="#0A0E1A" stroke-width="8"/>
  
  <!-- Candlestick 2 -->
  <rect x="200" y="280" width="24" height="80" fill="#0A0E1A" rx="2"/>
  <line x1="212" y1="260" x2="212" y2="290" stroke="#0A0E1A" stroke-width="8"/>
  <line x1="212" y1="340" x2="212" y2="360" stroke="#0A0E1A" stroke-width="8"/>
  
  <!-- Candlestick 3 -->
  <rect x="280" y="200" width="24" height="50" fill="#0A0E1A" rx="2"/>
  <line x1="292" y1="180" x2="292" y2="210" stroke="#0A0E1A" stroke-width="8"/>
  <line x1="292" y1="240" x2="292" y2="250" stroke="#0A0E1A" stroke-width="8"/>
  
  <!-- Candlestick 4 -->
  <rect x="360" y="220" width="24" height="70" fill="#0A0E1A" rx="2"/>
  <line x1="372" y1="200" x2="372" y2="230" stroke="#0A0E1A" stroke-width="8"/>
  <line x1="372" y1="280" x2="372" y2="290" stroke="#0A0E1A" stroke-width="8"/>
  
  <!-- Signal dot -->
  <circle cx="440" cy="180" r="16" fill="#0A0E1A"/>
  <circle cx="440" cy="180" r="8" fill="#00FF00"/>
</svg>
