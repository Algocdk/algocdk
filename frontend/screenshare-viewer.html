<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Share - Viewer | Algocdk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0D1421;
            color: #E2E8F0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s;
        }
        .glass:hover { 
            border-color: rgba(255, 69, 0, 0.3);
            box-shadow: 0 4px 20px rgba(255, 69, 0, 0.1);
        }
        .screen-display { 
            position: relative; 
            background: #0e1117;
            border-radius: 12px; 
            overflow: hidden; 
            min-height: 500px;
            border: 1px solid #2b2f3a;
        }
        .screen-display:fullscreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .screen-display:-webkit-full-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .screen-display:-moz-full-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .session-card { 
            transition: all 0.3s; 
            cursor: pointer; 
            animation: fadeInUp 0.5s ease;
        }
        .session-card:hover { 
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(255, 69, 0, 0.2);
            border-color: rgba(255, 69, 0, 0.5);
        }
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .video-display { width: 100%; height: auto; }
        .chat-message { animation: slideIn 0.3s ease; }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .btn-primary { 
            background: linear-gradient(135deg, #FF4500 0%, #E63900 100%);
            transition: all 0.3s;
        }
        .btn-primary:hover { 
            background: linear-gradient(135deg, #E63900 0%, #CC3300 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 69, 0, 0.4);
        }
        .btn-danger { 
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            transition: all 0.3s;
        }
        .btn-danger:hover { 
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            transform: translateY(-2px);
        }
        .mic-active { 
            animation: micPulse 1s infinite;
        }
        @keyframes micPulse { 
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 
            50% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 
        }
        .notification { 
            animation: slideInDown 0.3s ease;
        }
        @keyframes slideInDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .live-badge {
            animation: livePulse 2s infinite;
        }
        @keyframes livePulse { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
        }
    </style>
</head>
<body>
    <div class="min-h-screen p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-3xl font-bold mb-2">
                        <span style="color: #FF4500;">Algo</span><span style="color: white;">cdk</span>
                    </h1>
                    <p class="text-slate-400">Join active screen sharing sessions</p>
                </div>
                <a href="/app" class="glass px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i>Back to App
                </a>
            </div>

            <div id="sessionsList">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-semibold text-white">
                        <i class="fas fa-broadcast-tower mr-2 text-green-500"></i>Active Sessions
                    </h2>
                    <button onclick="loadActiveSessions()" class="glass px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors">
                        <i class="fas fa-sync-alt mr-2"></i>Refresh
                    </button>
                </div>
                <div id="sessionsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="viewerInterface" class="hidden">
                <div class="glass rounded-xl p-6 mb-6">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-green-500 to-green-600 flex items-center justify-center">
                                <i class="fas fa-user-tie text-white text-xl"></i>
                            </div>
                            <div>
                                <h2 class="text-xl font-semibold text-white">Viewing: <span id="adminName"></span></h2>
                                <p class="text-sm text-slate-400">Session ID: <span id="currentSessionId"></span></p>
                            </div>
                        </div>
                        <button id="leaveBtn" class="btn-danger px-6 py-3 rounded-lg font-medium transition-all shadow-lg hover:shadow-xl">
                            <i class="fas fa-sign-out-alt mr-2"></i>Leave Session
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="glass rounded-xl p-6">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-lg font-semibold text-white">
                                    <i class="fas fa-tv mr-2 text-orange-500"></i>Shared Screen
                                </h3>
                                <button id="fullscreenBtn" class="glass px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors" title="Toggle Fullscreen">
                                    <i class="fas fa-expand"></i>
                                </button>
                            </div>
                            <div id="screenContainer" class="screen-display">
                                <canvas id="screenCanvas" class="video-display"></canvas>
                                <div id="waitingMessage" class="flex flex-col items-center justify-center h-full text-slate-400">
                                    <i class="fas fa-spinner fa-spin text-6xl mb-4"></i>
                                    <p class="text-lg">Waiting for screen data...</p>
                                </div>
                            </div>
                        </div>

                        <div class="glass rounded-xl p-6">
                            <h3 class="text-lg font-semibold text-white mb-4">
                                <i class="fas fa-comments mr-2 text-green-500"></i>Chat
                            </h3>
                            <div id="chatMessages" class="bg-slate-900/50 rounded-lg p-4 mb-4 h-64 overflow-y-auto space-y-2"></div>
                            <div class="flex gap-2">
                                <button id="micBtn" class="glass px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors hidden" title="Toggle Microphone">
                                    <i class="fas fa-microphone-slash"></i>
                                </button>
                                <input type="text" id="chatInput" placeholder="Type a message..." 
                                       class="flex-1 bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500">
                                <button id="sendChatBtn" class="btn-primary px-6 py-3 rounded-lg font-medium">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-1">
                        <div class="glass rounded-xl p-6 sticky top-8">
                            <h3 class="text-lg font-semibold text-white mb-4">
                                <i class="fas fa-info-circle mr-2 text-purple-500"></i>Session Info
                            </h3>
                            <div class="space-y-4">
                                <div class="bg-slate-800/50 rounded-lg p-4">
                                    <p class="text-sm text-slate-400 mb-1">Host</p>
                                    <p class="font-semibold text-white" id="infoAdminName">-</p>
                                </div>
                                <div class="bg-slate-800/50 rounded-lg p-4">
                                    <p class="text-sm text-slate-400 mb-1">Started At</p>
                                    <p class="font-semibold text-white" id="startedAt">-</p>
                                </div>
                                <div class="bg-slate-800/50 rounded-lg p-4">
                                    <p class="text-sm text-slate-400 mb-1">Viewers</p>
                                    <p class="font-semibold text-white" id="viewerCount">0</p>
                                </div>
                                <div class="bg-green-500/20 rounded-lg p-4 border border-green-500/30 live-badge">
                                    <div class="flex items-center">
                                        <div class="w-2 h-2 bg-green-500 rounded-full pulse mr-2"></div>
                                        <p class="text-green-400 font-medium">Live</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/screenshare-viewer.js"></script>
</body>
</html>
