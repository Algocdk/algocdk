<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Share - Viewer | Algocdk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0D1421 0%, #1a1f2e 100%);
            color: #E2E8F0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
        }
        .glass:hover { 
            border-color: rgba(255, 69, 0, 0.3);
            box-shadow: 0 4px 20px rgba(255, 69, 0, 0.1);
            transform: translateY(-2px);
        }
        .screen-display { 
            position: relative; 
            background: linear-gradient(135deg, #0e1117 0%, #1a1d2e 100%);
            border-radius: 16px; 
            overflow: hidden; 
            min-height: 500px;
            border: 2px solid #2b2f3a;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .screen-display:fullscreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; border-radius: 0; }
        .screen-display:-webkit-full-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; border-radius: 0; }
        .screen-display:-moz-full-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; border-radius: 0; }
        .session-card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            animation: fadeInUp 0.6s ease;
            position: relative;
            overflow: hidden;
        }
        .session-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 69, 0, 0.1), transparent);
            transition: left 0.5s;
        }
        .session-card:hover::before { left: 100%; }
        .session-card:hover { 
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 32px rgba(255, 69, 0, 0.3);
            border-color: rgba(255, 69, 0, 0.6);
        }
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .video-display { width: 100%; height: auto; display: block; }
        .chat-message { 
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-origin: left center;
        }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(-20px) scale(0.95); } 
            to { opacity: 1; transform: translateX(0) scale(1); } 
        }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .btn-primary { 
            background: linear-gradient(135deg, #FF4500 0%, #E63900 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn-primary:hover::before { width: 300px; height: 300px; }
        .btn-primary:hover { 
            background: linear-gradient(135deg, #E63900 0%, #CC3300 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 69, 0, 0.5);
        }
        .btn-danger { 
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            transition: all 0.3s ease;
        }
        .btn-danger:hover { 
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
        }
        .mic-active { 
            animation: micPulse 1.5s infinite;
        }
        @keyframes micPulse { 
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 
            50% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); } 
        }
        .notification { 
            animation: slideInDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideInDown { 
            from { opacity: 0; transform: translateY(-30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .live-badge {
            animation: livePulse 2s infinite;
        }
        @keyframes livePulse { 
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin { animation: spin 2s linear infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .bounce { animation: bounce 2s infinite; }
        .chat-input-focus { 
            animation: inputGlow 0.3s ease;
        }
        @keyframes inputGlow { 
            0% { box-shadow: 0 0 0 0 rgba(255, 69, 0, 0.4); } 
            100% { box-shadow: 0 0 0 4px rgba(255, 69, 0, 0); } 
        }
        @media (max-width: 768px) {
            .screen-display { min-height: 300px; }
            .session-card:hover { transform: translateY(-4px) scale(1.01); }
        }
        .emoji-picker {
            position: absolute;
            bottom: 100%;
            right: 0;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 8px;
            animation: fadeInUp 0.3s ease;
            z-index: 1000;
        }
        .emoji-btn {
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 4px;
        }
        .emoji-btn:hover { transform: scale(1.3); }
    </style>
</head>
<body>
    <div class="min-h-screen p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-3xl font-bold mb-2">
                        <span style="color: #FF4500;">Algo</span><span style="color: white;">cdk</span>
                    </h1>
                    <p class="text-slate-400">Join active screen sharing sessions</p>
                </div>
                <a href="/app" class="glass px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i>Back to App
                </a>
            </div>

            <div id="sessionsList">
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 gap-4">
                    <h2 class="text-xl font-semibold text-white">
                        <i class="fas fa-broadcast-tower mr-2 text-green-500 bounce"></i>Active Sessions
                    </h2>
                    <button onclick="loadActiveSessions()" class="glass px-4 py-2 rounded-lg hover:bg-slate-700 transition-all">
                        <i class="fas fa-sync-alt mr-2"></i>Refresh
                    </button>
                </div>
                <div id="sessionsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6"></div>
            </div>

            <div id="viewerInterface" class="hidden">
                <div class="glass rounded-xl p-4 md:p-6 mb-6">
                    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                        <div class="flex items-center space-x-3 md:space-x-4">
                            <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-gradient-to-br from-green-500 to-green-600 flex items-center justify-center shadow-lg">
                                <i class="fas fa-user-tie text-white text-lg md:text-xl"></i>
                            </div>
                            <div>
                                <h2 class="text-lg md:text-xl font-semibold text-white">Viewing: <span id="adminName"></span></h2>
                                <p class="text-xs md:text-sm text-slate-400">Session ID: <span id="currentSessionId"></span></p>
                            </div>
                        </div>
                        <button id="leaveBtn" class="btn-danger px-4 md:px-6 py-2 md:py-3 rounded-lg font-medium transition-all shadow-lg hover:shadow-xl w-full sm:w-auto">
                            <i class="fas fa-sign-out-alt mr-2"></i>Leave Session
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6">
                    <div class="lg:col-span-2 space-y-4 md:space-y-6">
                        <div class="glass rounded-xl p-4 md:p-6">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-base md:text-lg font-semibold text-white">
                                    <i class="fas fa-tv mr-2 text-orange-500"></i>Shared Screen
                                </h3>
                                <button id="fullscreenBtn" class="glass px-3 md:px-4 py-2 rounded-lg hover:bg-slate-700 transition-all" title="Toggle Fullscreen">
                                    <i class="fas fa-expand"></i>
                                </button>
                            </div>
                            <div id="screenContainer" class="screen-display">
                                <canvas id="screenCanvas" class="video-display"></canvas>
                                <div id="waitingMessage" class="flex flex-col items-center justify-center h-full text-slate-400 p-4">
                                    <i class="fas fa-spinner spin text-4xl md:text-6xl mb-4 text-orange-500"></i>
                                    <p class="text-base md:text-lg text-center">Waiting for screen data...</p>
                                    <p class="text-xs md:text-sm text-slate-500 mt-2 text-center">Please wait while we connect you</p>
                                </div>
                            </div>
                        </div>

                        <div class="glass rounded-xl p-4 md:p-6">
                            <h3 class="text-base md:text-lg font-semibold text-white mb-4">
                                <i class="fas fa-comments mr-2 text-green-500"></i>Chat
                            </h3>
                            <div id="chatMessages" class="bg-slate-900/50 rounded-lg p-3 md:p-4 mb-4 h-48 md:h-64 overflow-y-auto space-y-2"></div>
                            <div class="flex gap-2 relative">
                                <button id="micBtn" class="glass px-3 md:px-4 py-2 rounded-lg hover:bg-slate-700 transition-all hidden" title="Toggle Microphone">
                                    <i class="fas fa-microphone-slash"></i>
                                </button>
                                <button id="emojiBtn" class="glass px-3 md:px-4 py-2 rounded-lg hover:bg-slate-700 transition-all" title="Add Emoji">
                                    <i class="fas fa-smile"></i>
                                </button>
                                <div id="emojiPicker" class="emoji-picker hidden"></div>
                                <input type="text" id="chatInput" placeholder="Type a message..." 
                                       class="flex-1 bg-slate-900/50 border border-slate-700 rounded-lg px-3 md:px-4 py-2 md:py-3 text-sm md:text-base text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all">
                                <button id="sendChatBtn" class="btn-primary px-4 md:px-6 py-2 md:py-3 rounded-lg font-medium">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-1">
                        <div class="glass rounded-xl p-4 md:p-6 lg:sticky lg:top-8">
                            <h3 class="text-base md:text-lg font-semibold text-white mb-4">
                                <i class="fas fa-info-circle mr-2 text-purple-500"></i>Session Info
                            </h3>
                            <div class="space-y-3 md:space-y-4">
                                <div class="bg-slate-800/50 rounded-lg p-3 md:p-4 transition-all hover:bg-slate-800/70">
                                    <p class="text-xs md:text-sm text-slate-400 mb-1">Host</p>
                                    <p class="font-semibold text-white text-sm md:text-base" id="infoAdminName">-</p>
                                </div>
                                <div class="bg-slate-800/50 rounded-lg p-3 md:p-4 transition-all hover:bg-slate-800/70">
                                    <p class="text-xs md:text-sm text-slate-400 mb-1">Started At</p>
                                    <p class="font-semibold text-white text-sm md:text-base" id="startedAt">-</p>
                                </div>
                                <div class="bg-slate-800/50 rounded-lg p-3 md:p-4 transition-all hover:bg-slate-800/70">
                                    <p class="text-xs md:text-sm text-slate-400 mb-1">Viewers</p>
                                    <p class="font-semibold text-white text-sm md:text-base" id="viewerCount">0</p>
                                </div>
                                <div class="bg-green-500/20 rounded-lg p-3 md:p-4 border border-green-500/30 live-badge">
                                    <div class="flex items-center">
                                        <div class="w-2 h-2 bg-green-500 rounded-full pulse mr-2"></div>
                                        <p class="text-green-400 font-medium text-sm md:text-base">Live</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/screenshare-viewer.js"></script>
</body>
</html>
