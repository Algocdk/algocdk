<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algocdk | Automate your success</title>
    <link rel="stylesheet" href="output.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fff0f0',
                            100: '#ffd6d6',
                            500: '#ff4500',
                            600: '#e63e00',
                            700: '#cc3700',
                        },
                        dark: {
                            900: '#000000',
                            800: '#1a1a1a',
                            700: '#333333',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-bg {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
        }

        .gradient-text {
            background: linear-gradient(135deg, #ff4500, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <!-- Background Elements -->
    <div class="absolute inset-0 overflow-hidden">
        <!-- Animated Background Elements -->
        <div class="absolute top-10 left-10 w-20 h-20 rounded-full bg-orange-500/10 animate-pulse"></div>
        <div class="absolute top-1/4 right-20 w-16 h-16 rounded-full bg-red-500/10 animate-pulse-slow"></div>
        <div class="absolute bottom-20 left-1/4 w-24 h-24 rounded-full bg-orange-600/10 animate-float"></div>
        <div class="absolute bottom-10 right-10 w-12 h-12 rounded-full bg-red-600/10 animate-pulse"></div>

        <!-- Grid Pattern -->
        <div class="absolute inset-0 opacity-10" style="background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), 
                    linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
                    background-size: 50px 50px;">
        </div>
    </div>

    <div class="glass-effect rounded-2xl shadow-2xl p-8 w-full max-w-md relative z-10">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-3 mb-2">
                <div style="width:40px;height:40px;background:linear-gradient(135deg,#ff4500,#ff6b35);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;">A</div>
                <h1 class="text-3xl font-bold"><span style="color:#ff4500;">Algo</span><span class="text-white">cdk</span></h1>
            </div>
            <p class="text-gray-400 text-sm">Automate your success</p>
        </div>

        <!-- Tabs for Login / Signup -->
        <div class="flex mb-6 rounded-lg bg-dark-800 p-1">
            <button data-toggle-form="login"
                class="flex-1 py-2 px-4 rounded-lg font-medium transition-all duration-300 bg-primary-500 text-white">
                Login
            </button>
            <button data-toggle-form="signup"
                class="flex-1 py-2 px-4 rounded-lg font-medium transition-all duration-300 text-gray-400 hover:text-white">
                Signup
            </button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-4">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-envelope text-gray-500"></i>
                </div>
                <input type="email" name="email" placeholder="Email"
                    class="w-full pl-10 pr-4 py-3 rounded-lg bg-dark-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                    required>
            </div>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-lock text-gray-500"></i>
                </div>
                <input type="password" name="password" placeholder="Password"
                    class="w-full pl-10 pr-4 py-3 rounded-lg bg-dark-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                    required>
            </div>
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-gray-400">
                    <input type="checkbox"
                        class="rounded bg-gray-700 border-gray-600 text-primary-500 focus:ring-primary-500">
                    <span class="ml-2">Remember me</span>
                </label>
                <button type="button" data-toggle-form="forgot" class="text-primary-500 hover:text-primary-400 transition-colors">Forgot password?</button>
            </div>
            <button type="submit"
                class="w-full py-3 px-4 bg-gradient-to-r from-primary-500 to-red-600 text-white rounded-lg font-semibold shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-opacity-50 flex items-center justify-center">
                <span>Login</span>
                <div class="loading-spinner hidden ml-2">
                    <i class="fas fa-circle-notch animate-spin"></i>
                </div>
            </button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="space-y-4 hidden">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-user text-gray-500"></i>
                </div>
                <input type="text" name="name" placeholder="Full Name"
                    class="w-full pl-10 pr-4 py-3 rounded-lg bg-dark-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                    required>
            </div>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-envelope text-gray-500"></i>
                </div>
                <input type="email" name="email" placeholder="Email"
                    class="w-full pl-10 pr-4 py-3 rounded-lg bg-dark-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                    required>
            </div>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-lock text-gray-500"></i>
                </div>
                <input type="password" id="signup-password" name="password" placeholder="Password"
                    class="w-full pl-10 pr-12 py-3 rounded-lg bg-dark-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                    required>
                <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center" onclick="togglePasswordVisibility('signup-password', this)">
                    <i class="fas fa-eye text-gray-500 hover:text-gray-300"></i>
                </button>
            </div>
            <div id="password-strength" class="hidden">
                <div class="flex gap-1 mb-1">
                    <div class="h-1 flex-1 rounded bg-gray-700" id="strength-bar-1"></div>
                    <div class="h-1 flex-1 rounded bg-gray-700" id="strength-bar-2"></div>
                    <div class="h-1 flex-1 rounded bg-gray-700" id="strength-bar-3"></div>
                    <div class="h-1 flex-1 rounded bg-gray-700" id="strength-bar-4"></div>
                </div>
                <p class="text-xs" id="strength-text"></p>
            </div>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-lock text-gray-500"></i>
                </div>
                <input type="password" id="signup-confirm-password" name="confirmPassword" placeholder="Confirm Password"
                    class="w-full pl-10 pr-12 py-3 rounded-lg bg-dark-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                    required>
                <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center" onclick="togglePasswordVisibility('signup-confirm-password', this)">
                    <i class="fas fa-eye text-gray-500 hover:text-gray-300"></i>
                </button>
            </div>
            <div id="password-match" class="hidden text-xs"></div>
            <div class="flex items-center text-sm">
                <label class="flex items-center text-gray-400">
                    <input type="checkbox"
                        class="rounded bg-gray-700 border-gray-600 text-primary-500 focus:ring-primary-500" required>
                    <span class="ml-2">I agree to the <a href="terms"
                            class="text-primary-500 hover:text-primary-400 transition-colors">Terms of Service</a> and
                        <a href="privacy" class="text-primary-500 hover:text-primary-400 transition-colors">Privacy
                            Policy</a></span>
                </label>
            </div>
            <button type="submit"
                class="w-full py-3 px-4 bg-gradient-to-r from-primary-500 to-red-600 text-white rounded-lg font-semibold shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-opacity-50 flex items-center justify-center">
                <span>Create Account</span>
                <div class="loading-spinner hidden ml-2">
                    <i class="fas fa-circle-notch animate-spin"></i>
                </div>
            </button>
        </form>

        <!-- Message Display -->
        <div id="message" class="mt-4 p-3 rounded-lg hidden"></div>

        <!-- Forgot Password Form -->
        <form id="forgot-password-form" class="space-y-4 hidden">
            <div class="text-center mb-2">
                <div class="w-14 h-14 bg-primary-500 rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-lock text-white text-xl"></i>
                </div>
                <h3 class="text-white font-semibold text-lg">Forgot your password?</h3>
                <p class="text-gray-400 text-sm mt-1">Enter your email and we'll send you a reset link.</p>
            </div>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-envelope text-gray-500"></i>
                </div>
                <input type="email" name="email" placeholder="Your email address"
                    class="w-full pl-10 pr-4 py-3 rounded-lg bg-dark-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                    required>
            </div>
            <button type="submit"
                class="w-full py-3 px-4 bg-gradient-to-r from-primary-500 to-red-600 text-white rounded-lg font-semibold shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-opacity-50 flex items-center justify-center">
                <span>Send Reset Link</span>
                <div class="loading-spinner hidden ml-2">
                    <i class="fas fa-circle-notch animate-spin"></i>
                </div>
            </button>
            <button type="button" data-toggle-form="login"
                class="w-full py-3 px-4 bg-dark-800 text-gray-300 rounded-lg font-semibold border border-gray-700 hover:bg-gray-700 hover:text-white transition-all duration-300">
                ← Back to Login
            </button>
        </form>
    </div>

    <!-- Include JavaScript modules -->
    <script>
        // Password visibility toggle
        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Password strength checker
        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z\d]/.test(password)) strength++;
            return Math.min(strength, 4);
        }

        // Update password strength UI
        function updatePasswordStrength() {
            const password = document.getElementById('signup-password').value;
            const strengthDiv = document.getElementById('password-strength');
            const strengthText = document.getElementById('strength-text');
            
            if (!password) {
                strengthDiv.classList.add('hidden');
                return;
            }
            
            strengthDiv.classList.remove('hidden');
            const strength = checkPasswordStrength(password);
            const bars = [1, 2, 3, 4].map(i => document.getElementById(`strength-bar-${i}`));
            
            bars.forEach((bar, i) => {
                bar.className = 'h-1 flex-1 rounded';
                if (i < strength) {
                    if (strength === 1) bar.classList.add('bg-red-500');
                    else if (strength === 2) bar.classList.add('bg-orange-500');
                    else if (strength === 3) bar.classList.add('bg-yellow-500');
                    else bar.classList.add('bg-green-500');
                } else {
                    bar.classList.add('bg-gray-700');
                }
            });
            
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];
            const colors = ['text-red-500', 'text-orange-500', 'text-yellow-500', 'text-green-500'];
            strengthText.textContent = labels[strength - 1] || '';
            strengthText.className = `text-xs ${colors[strength - 1] || ''}`;
        }

        // Check password match
        function checkPasswordMatch() {
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm-password').value;
            const matchDiv = document.getElementById('password-match');
            
            if (!confirmPassword) {
                matchDiv.classList.add('hidden');
                return;
            }
            
            matchDiv.classList.remove('hidden');
            if (password === confirmPassword) {
                matchDiv.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match';
                matchDiv.className = 'text-xs text-green-500 flex items-center gap-1';
            } else {
                matchDiv.innerHTML = '<i class="fas fa-times-circle"></i> Passwords do not match';
                matchDiv.className = 'text-xs text-red-500 flex items-center gap-1';
            }
        }

        // Add event listeners when DOM loads
        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('signup-password');
            const confirmPasswordInput = document.getElementById('signup-confirm-password');
            
            if (passwordInput) {
                passwordInput.addEventListener('input', () => {
                    updatePasswordStrength();
                    checkPasswordMatch();
                });
            }
            
            if (confirmPasswordInput) {
                confirmPasswordInput.addEventListener('input', checkPasswordMatch);
            }
        });
    </script>
    <script src="api.js"></script>
    <script src="notifications.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script src="/offline-detector.js"></script>
</body>

</html>
