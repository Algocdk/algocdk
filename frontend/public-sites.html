<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Sites - Algocdk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4">
        <div class="flex items-center justify-between">
            <h1 class="text-xl font-bold"><span style="color: #FF4500;">Algo</span><span>cdk</span></h1>
            <a href="/app" class="bg-primary hover:bg-secondary px-4 py-2 rounded-lg transition-colors">Back to App</a>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8">
        <h2 class="text-3xl font-bold mb-6">Browse Public Sites</h2>
        
        <div id="sitesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="flex justify-center py-12 col-span-full">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </main>

    <style>
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #FF4500;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        async function loadPublicSites() {
            try {
                const response = await fetch('/api/sites/public?t=' + Date.now());
                const data = await response.json();
                console.log('Loaded sites:', data);
                const sites = data.sites || [];
                
                const grid = document.getElementById('sitesGrid');
                
                if (sites.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <i class="fas fa-globe text-gray-500 text-6xl mb-4"></i>
                            <h3 class="text-xl font-semibold text-gray-400 mb-2">No Public Sites Yet</h3>
                            <p class="text-gray-500">Check back later for new sites</p>
                        </div>
                    `;
                    return;
                }
                
                grid.innerHTML = sites.map(site => `
                    <div class="bg-gray-800 rounded-xl p-6 hover:bg-gray-700 transition-colors">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-semibold text-white text-lg">${site.name}</h4>
                                <p class="text-xs text-gray-500 mt-1">by ${site.owner?.name || site.owner?.email?.split('@')[0] || 'Unknown'}</p>
                            </div>
                            <span class="px-2 py-1 rounded text-xs bg-success/20 text-success">
                                Public
                            </span>
                        </div>
                        <p class="text-gray-400 text-sm mb-4">${site.description || 'No description'}</p>
                        <div class="flex items-center justify-between text-sm text-gray-400 mb-4">
                            <span><i class="fas fa-eye mr-1"></i>${site.view_count || 0} views</span>
                            <span><i class="fas fa-calendar mr-1"></i>${new Date(site.created_at).toLocaleDateString()}</span>
                        </div>
                        <a href="/site/${site.slug}" target="_blank" class="block w-full bg-primary hover:bg-secondary text-center py-2 rounded-lg text-sm transition-colors">
                            <i class="fas fa-external-link-alt mr-1"></i>Visit Site
                        </a>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load sites:', error);
                document.getElementById('sitesGrid').innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <i class="fas fa-exclamation-triangle text-red-500 text-6xl mb-4"></i>
                        <h3 class="text-xl font-semibold text-gray-400 mb-2">Failed to Load Sites</h3>
                        <p class="text-gray-500">Please try again later</p>
                    </div>
                `;
            }
        }

        loadPublicSites();
    </script>
</body>
</html>
