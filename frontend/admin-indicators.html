<!-- Chart Indicators Content -->
<div class="bg-gray-800 rounded-xl p-6">
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-semibold">Chart Indicators</h3>
        <button onclick="showCreateIndicatorModal()" class="bg-primary hover:bg-secondary px-4 py-2 rounded-lg">
            <i class="fas fa-plus mr-2"></i>Create Indicator
        </button>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead>
                <tr class="border-b border-gray-700">
                    <th class="text-left py-3 px-4">Name</th>
                    <th class="text-left py-3 px-4">Category</th>
                    <th class="text-left py-3 px-4">Type</th>
                    <th class="text-left py-3 px-4">Price</th>
                    <th class="text-left py-3 px-4">Created</th>
                    <th class="text-left py-3 px-4">Actions</th>
                </tr>
            </thead>
            <tbody id="indicatorsTableBody">
                <tr>
                    <td colspan="6" class="text-center py-8">
                        <div class="loading-spinner mx-auto"></div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Create/Edit Indicator Modal -->
<div id="indicatorModalOverlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="modal-content bg-gray-800 rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 id="indicatorModalTitle" class="text-lg font-semibold">Create Chart Indicator</h3>
                <button onclick="closeIndicatorModal()" class="text-gray-400 hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="createIndicatorForm">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Indicator Name *</label>
                        <input type="text" name="name" required placeholder="e.g., Advanced RSI" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Description</label>
                        <textarea name="description" rows="2" placeholder="Brief description of the indicator" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Category *</label>
                            <select name="category" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2">
                                <option value="">Select category</option>
                                <option value="Trend">Trend</option>
                                <option value="Momentum">Momentum</option>
                                <option value="Volatility">Volatility</option>
                                <option value="Volume">Volume</option>
                                <option value="Custom">Custom</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Type *</label>
                            <select name="is_free" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2">
                                <option value="true">Free</option>
                                <option value="false">Paid</option>
                            </select>
                        </div>
                    </div>
                    <div id="priceField" style="display: none;">
                        <label class="block text-sm font-medium mb-2">Price ($) *</label>
                        <input type="number" name="price" min="0" step="0.01" placeholder="0.00" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Indicator Code File (JavaScript) *</label>
                        <input type="file" name="code_file" accept=".js" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2">
                        <p class="text-xs text-gray-400 mt-1">
                            <i class="fas fa-info-circle mr-1"></i>
                            Upload a .js file with your indicator code. <a href="/indicator-template" target="_blank" class="text-primary">View template</a>
                        </p>
                    </div>
                    <div class="flex space-x-3 pt-4">
                        <button type="submit" class="flex-1 bg-primary hover:bg-secondary py-2 rounded-lg">
                            <i class="fas fa-save mr-2"></i>Save Indicator
                        </button>
                        <button type="button" onclick="closeIndicatorModal()" class="flex-1 bg-gray-600 hover:bg-gray-500 py-2 rounded-lg">Cancel</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
// Chart Indicators Management
let currentIndicatorId = null;

// Show/hide price field based on type
document.querySelector('[name="is_free"]').addEventListener('change', function() {
    const priceField = document.getElementById('priceField');
    if (this.value === 'false') {
        priceField.style.display = 'block';
        document.querySelector('[name="price"]').required = true;
    } else {
        priceField.style.display = 'none';
        document.querySelector('[name="price"]').required = false;
    }
});

function showCreateIndicatorModal() {
    currentIndicatorId = null;
    document.getElementById('indicatorModalTitle').textContent = 'Create Chart Indicator';
    document.getElementById('createIndicatorForm').reset();
    document.getElementById('priceField').style.display = 'none';
    
    // Reset file input to required for create
    const fileInput = document.querySelector('[name="code_file"]');
    fileInput.required = true;
    const fileLabel = fileInput.previousElementSibling;
    fileLabel.textContent = 'Indicator Code File (JavaScript) *';
    
    document.getElementById('indicatorModalOverlay').classList.remove('hidden');
}

function closeIndicatorModal() {
    document.getElementById('indicatorModalOverlay').classList.add('hidden');
    currentIndicatorId = null;
}

async function loadIndicators() {
    try {
        const response = await fetch('/api/admin/indicators', {
            headers: {
                'Authorization': `Bearer ${TokenManager.get()}`
            }
        });
        
        if (!response.ok) throw new Error('Failed to load indicators');
        
        const data = await response.json();
        const indicators = data.indicators || [];
        const tbody = document.getElementById('indicatorsTableBody');
        
        document.getElementById('indicatorsBadge').textContent = indicators.length;
        
        if (indicators.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8">No indicators created yet</td></tr>';
            return;
        }
        
        tbody.innerHTML = indicators.map(ind => `
            <tr class="border-b border-gray-700">
                <td class="py-3 px-4">
                    <div class="font-medium">${ind.name}</div>
                    ${ind.description ? `<div class="text-xs text-gray-400">${ind.description}</div>` : ''}
                </td>
                <td class="py-3 px-4">
                    <span class="px-2 py-1 bg-gray-700 rounded text-xs">${ind.category || 'N/A'}</span>
                </td>
                <td class="py-3 px-4">
                    <span class="px-2 py-1 rounded text-xs ${ind.is_free ? 'bg-success/20 text-success' : 'bg-warning/20 text-warning'}">
                        ${ind.is_free ? 'Free' : 'Paid'}
                    </span>
                </td>
                <td class="py-3 px-4">${ind.is_free ? '-' : '$' + (ind.price || 0).toFixed(2)}</td>
                <td class="py-3 px-4 text-sm text-gray-400">${new Date(ind.created_at).toLocaleDateString()}</td>
                <td class="py-3 px-4">
                    <div class="flex space-x-2">
                        <button onclick="editIndicator(${ind.id})" class="bg-primary hover:bg-secondary px-3 py-1 rounded text-sm">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteIndicator(${ind.id})" class="bg-danger hover:bg-red-600 px-3 py-1 rounded text-sm">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    } catch (error) {
        console.error('Failed to load indicators:', error);
        utils.notify('Failed to load indicators', 'error');
    }
}

async function editIndicator(id) {
    try {
        const response = await fetch('/api/indicators', {
            headers: {
                'Authorization': `Bearer ${TokenManager.get()}`
            }
        });
        
        const data = await response.json();
        const indicator = data.indicators.find(ind => ind.id === id);
        
        if (!indicator) {
            utils.notify('Indicator not found', 'error');
            return;
        }
        
        currentIndicatorId = id;
        document.getElementById('indicatorModalTitle').textContent = 'Edit Chart Indicator';
        document.querySelector('[name="name"]').value = indicator.name;
        document.querySelector('[name="description"]').value = indicator.description || '';
        document.querySelector('[name="category"]').value = indicator.category || '';
        document.querySelector('[name="is_free"]').value = indicator.is_free ? 'true' : 'false';
        document.querySelector('[name="price"]').value = indicator.price || '';
        
        // For edit, make file optional and show note about existing code
        const fileInput = document.querySelector('[name="code_file"]');
        fileInput.required = false;
        const fileLabel = fileInput.previousElementSibling;
        fileLabel.innerHTML = 'Indicator Code File (JavaScript) <span class="text-gray-400 text-xs">(optional - leave empty to keep existing)</span>';
        
        if (!indicator.is_free) {
            document.getElementById('priceField').style.display = 'block';
            document.querySelector('[name="price"]').required = true;
        }
        
        document.getElementById('indicatorModalOverlay').classList.remove('hidden');
    } catch (error) {
        utils.notify('Failed to load indicator', 'error');
    }
}

async function deleteIndicator(id) {
    if (!confirm('Are you sure you want to delete this indicator?')) return;
    
    try {
        const response = await fetch(`/api/admin/indicators/${id}`, {
            method: 'DELETE',
            headers: {
                'Authorization': `Bearer ${TokenManager.get()}`
            }
        });
        
        if (response.ok) {
            utils.notify('Indicator deleted successfully', 'success');
            loadIndicators();
        } else {
            const error = await response.json();
            utils.notify(error.error || 'Failed to delete indicator', 'error');
        }
    } catch (error) {
        utils.notify('Failed to delete indicator', 'error');
    }
}

document.getElementById('createIndicatorForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    
    // Read the uploaded file if present
    const codeFile = formData.get('code_file');
    let code = null;
    
    if (codeFile && codeFile.size > 0) {
        code = await codeFile.text();
    } else if (!currentIndicatorId) {
        utils.notify('Please upload a code file', 'error');
        return;
    }
    
    const data = {
        name: formData.get('name'),
        description: formData.get('description'),
        category: formData.get('category'),
        is_free: formData.get('is_free') === 'true',
        price: parseFloat(formData.get('price')) || 0
    };
    
    if (code) {
        data.code = code;
    }
    
    try {
        const url = currentIndicatorId 
            ? `/api/admin/indicators/${currentIndicatorId}`
            : '/api/admin/indicators';
        const method = currentIndicatorId ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
            method,
            headers: {
                'Authorization': `Bearer ${TokenManager.get()}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            utils.notify(`Indicator ${currentIndicatorId ? 'updated' : 'created'} successfully!`, 'success');
            closeIndicatorModal();
            loadIndicators();
        } else {
            const error = await response.json();
            utils.notify(error.error || 'Failed to save indicator', 'error');
        }
    } catch (error) {
        utils.notify('Failed to save indicator', 'error');
    }
});

// Update switchView function to handle indicators
const originalSwitchView = window.switchView;
window.switchView = function(view) {
    originalSwitchView(view);
    if (view === 'indicators') {
        loadIndicators();
    }
};
</script>
