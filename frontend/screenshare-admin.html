<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Share - Admin | Algocdk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0D1421;
            color: #E2E8F0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s;
        }
        .glass:hover { 
            border-color: rgba(255, 69, 0, 0.3);
            box-shadow: 0 4px 20px rgba(255, 69, 0, 0.1);
        }
        .screen-preview { 
            position: relative; 
            background: #0e1117;
            border-radius: 12px; 
            overflow: hidden; 
            min-height: 450px;
            border: 1px solid #2b2f3a;
        }
        .video-preview { width: 100%; height: auto; display: none; }
        .participant-item { 
            transition: all 0.2s; 
            animation: slideInRight 0.3s ease;
            border-left: 3px solid transparent;
        }
        .participant-item:hover { 
            background: rgba(255, 69, 0, 0.1);
            transform: translateX(4px);
            border-left-color: #FF4500;
        }
        @keyframes slideInRight { 
            from { opacity: 0; transform: translateX(-20px); } 
            to { opacity: 1; transform: translateX(0); } 
        }
        .chat-message { animation: slideIn 0.3s ease; }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .btn-primary { 
            background: linear-gradient(135deg, #FF4500 0%, #E63900 100%);
            transition: all 0.3s;
        }
        .btn-primary:hover { 
            background: linear-gradient(135deg, #E63900 0%, #CC3300 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 69, 0, 0.4);
        }
        .btn-danger { 
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            transition: all 0.3s;
        }
        .btn-danger:hover { 
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            transform: translateY(-2px);
        }
        .mic-active { 
            animation: micPulse 1s infinite;
        }
        @keyframes micPulse { 
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 
            50% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 
        }
        .notification { 
            animation: slideInDown 0.3s ease;
        }
        @keyframes slideInDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .status-badge { 
            transition: all 0.3s;
        }
        .status-badge:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="min-h-screen p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-3xl font-bold mb-2">
                        <span style="color: #FF4500;">Algo</span><span style="color: white;">cdk</span>
                    </h1>
                    <p class="text-slate-400">Share your screen with platform users in real-time</p>
                </div>
                <a href="/admin" class="glass px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
                </a>
            </div>

            <div class="glass rounded-xl p-6 mb-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center">
                            <i class="fas fa-broadcast-tower text-white text-xl"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-semibold text-white">Session Control</h2>
                            <p class="text-sm text-slate-400">Manage your screen sharing session</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span id="sessionStatus" class="status-badge px-4 py-2 rounded-full text-sm font-medium bg-slate-700 text-slate-300">
                            <i class="fas fa-circle mr-2"></i>Not Started
                        </span>
                        <button id="startBtn" class="btn-primary px-6 py-3 rounded-lg font-medium transition-all shadow-lg hover:shadow-xl">
                            <i class="fas fa-play mr-2"></i>Start Screen Share
                        </button>
                        <button id="stopBtn" class="btn-danger px-6 py-3 rounded-lg font-medium transition-all shadow-lg hover:shadow-xl hidden">
                            <i class="fas fa-stop mr-2"></i>Stop Sharing
                        </button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <div class="glass rounded-xl p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-semibold text-white">
                                <i class="fas fa-tv mr-2 text-orange-500"></i>Screen Preview
                            </h3>
                            <div class="flex items-center gap-2">
                                <button id="micBtn" class="glass px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors hidden" title="Toggle Microphone">
                                    <i class="fas fa-microphone"></i>
                                </button>
                                <span id="viewerCount" class="px-3 py-1 rounded-full text-sm bg-orange-500/20 text-orange-400">
                                    <i class="fas fa-eye mr-1"></i>0 viewers
                                </span>
                            </div>
                        </div>
                        <div class="screen-preview">
                            <video id="screenPreview" class="video-preview" autoplay muted></video>
                            <div id="noPreview" class="flex flex-col items-center justify-center h-full text-slate-400">
                                <i class="fas fa-desktop text-6xl mb-4 opacity-50"></i>
                                <p class="text-lg">Click "Start Screen Share" to begin</p>
                                <p class="text-sm mt-2 opacity-75">Your screen will appear here</p>
                            </div>
                        </div>
                    </div>

                    <div class="glass rounded-xl p-6">
                        <h3 class="text-lg font-semibold text-white mb-4">
                            <i class="fas fa-comments mr-2 text-green-500"></i>Chat
                        </h3>
                        <div id="chatMessages" class="bg-slate-900/50 rounded-lg p-4 mb-4 h-64 overflow-y-auto space-y-2"></div>
                        <div class="flex gap-2">
                            <input type="text" id="chatInput" placeholder="Type a message..." 
                                   class="flex-1 bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500">
                            <button id="sendChatBtn" class="btn-primary px-6 py-3 rounded-lg font-medium">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-1">
                    <div class="glass rounded-xl p-6 sticky top-8">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-semibold text-white">
                                <i class="fas fa-users mr-2 text-purple-500"></i>Participants
                            </h3>
                            <span id="participantCount" class="px-3 py-1 rounded-full text-sm bg-purple-500/20 text-purple-400 font-medium">0</span>
                        </div>
                        <div id="participantList" class="space-y-2 max-h-96 overflow-y-auto">
                            <div class="text-center py-8 text-slate-500">
                                <i class="fas fa-user-friends text-3xl mb-2 opacity-50"></i>
                                <p class="text-sm">No participants yet</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/screenshare-admin.js"></script>
</body>
</html>
