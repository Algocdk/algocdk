<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - AlgoCDK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #111827; color: white; }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-4xl mx-auto p-4 md:p-6">
        <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold">Notifications</h1>
                <p class="text-gray-400 text-sm mt-1"><span id="unreadCount">0</span> unread messages</p>
            </div>
            <div class="flex items-center space-x-2 md:space-x-3 w-full md:w-auto">
                <button onclick="markAllAsRead()" class="flex-1 md:flex-none bg-primary hover:bg-secondary px-3 md:px-4 py-2 rounded-lg text-sm md:text-base">
                    <i class="fas fa-check-double mr-1 md:mr-2"></i><span class="hidden sm:inline">Mark All Read</span><span class="sm:hidden">Read All</span>
                </button>
                <a href="/app" class="flex-1 md:flex-none bg-gray-700 hover:bg-gray-600 px-3 md:px-4 py-2 rounded-lg text-center text-sm md:text-base">
                    <i class="fas fa-arrow-left mr-1 md:mr-2"></i><span class="hidden sm:inline">Back to App</span><span class="sm:hidden">Back</span>
                </a>
            </div>
        </div>
        
        <div id="notificationDetail" class="bg-gray-800 rounded-xl p-4 md:p-8">
            <div class="text-center py-8">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mx-auto"></div>
                <p class="mt-4 text-gray-400">Loading notification...</p>
            </div>
        </div>
        
        <div id="allNotifications" class="mt-6 space-y-4"></div>
    </div>

    <script src="/api.js"></script>
    <script>
        let allNotifications = [];
        
        async function loadNotification() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            try {
                const response = await fetch('/api/user/notifications', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                allNotifications = data.notifications || [];
                
                updateUnreadCount();
                
                if (id) {
                    const notification = allNotifications.find(n => n.id == id);
                    if (notification) {
                        document.getElementById('notificationDetail').innerHTML = `
                            <div class="mb-4">
                                <h2 class="text-xl md:text-2xl font-bold mb-2">${notification.title}</h2>
                                <p class="text-xs md:text-sm text-gray-400">${new Date(notification.created_at).toLocaleString()}</p>
                            </div>
                            <div class="prose prose-invert max-w-none">
                                <p class="text-gray-300 whitespace-pre-wrap text-base md:text-lg leading-relaxed">${notification.message}</p>
                            </div>
                        `;
                        
                        if (!notification.read) {
                            await fetch(`/api/user/notifications/${id}/read`, {
                                method: 'PUT',
                                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                            });
                            notification.read = true;
                            updateUnreadCount();
                        }
                    }
                } else {
                    document.getElementById('notificationDetail').innerHTML = `
                        <div class="text-center py-8">
                            <i class="fas fa-inbox text-4xl text-gray-400 mb-4"></i>
                            <p class="text-gray-400">Select a notification to view</p>
                        </div>
                    `;
                }
                
                // Show all notifications
                const others = id ? allNotifications.filter(n => n.id != id) : allNotifications;
                if (others.length > 0) {
                    document.getElementById('allNotifications').innerHTML = `
                        <h3 class="text-lg md:text-xl font-semibold mb-4">${id ? 'Other Notifications' : 'All Notifications'}</h3>
                        ${others.map(n => `
                            <a href="/notifications?id=${n.id}" class="block bg-gray-800 hover:bg-gray-700 rounded-lg p-3 md:p-4 ${n.read ? 'opacity-60' : ''}">
                                <div class="flex items-start justify-between gap-3">
                                    <div class="flex-1 min-w-0">
                                        <p class="font-semibold text-sm md:text-base truncate">${n.title}</p>
                                        <p class="text-xs md:text-sm text-gray-400 mt-1 line-clamp-2">${n.message.substring(0, 100)}${n.message.length > 100 ? '...' : ''}</p>
                                        <p class="text-xs text-gray-500 mt-2">${new Date(n.created_at).toLocaleString()}</p>
                                    </div>
                                    ${!n.read ? '<span class="w-2 h-2 bg-red-500 rounded-full flex-shrink-0"></span>' : ''}
                                </div>
                            </a>
                        `).join('')}
                    `;
                }
            } catch (error) {
                document.getElementById('notificationDetail').innerHTML = `
                    <div class="text-center py-8">
                        <i class="fas fa-exclamation-circle text-4xl text-red-500 mb-4"></i>
                        <p class="text-gray-400">Failed to load notification</p>
                    </div>
                `;
            }
        }
        
        function updateUnreadCount() {
            const unreadCount = allNotifications.filter(n => !n.read).length;
            document.getElementById('unreadCount').textContent = unreadCount;
        }
        
        async function markAllAsRead() {
            try {
                for (const notification of allNotifications) {
                    if (!notification.read) {
                        await fetch(`/api/user/notifications/${notification.id}/read`, {
                            method: 'PUT',
                            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                        });
                        notification.read = true;
                    }
                }
                updateUnreadCount();
                location.reload();
            } catch (error) {
                alert('Failed to mark all as read');
            }
        }
        
        loadNotification();
    </script>
</body>
</html>
