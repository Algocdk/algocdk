<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A0E1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Offline - Algocdk</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #0A0E1A 0%, #1a1f2e 100%);
      color: #E2E8F0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      text-align: center;
      touch-action: manipulation;
    }
    
    .container {
      max-width: 320px;
      width: 100%;
    }
    
    .icon-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: linear-gradient(135deg, #FF4500 0%, #FF8C00 100%);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(255, 69, 0, 0.3);
    }
    
    .icon-wrapper svg {
      width: 60px;
      height: 60px;
      fill: #0A0E1A;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #FF4500;
    }
    
    .subtitle {
      font-size: 17px;
      color: #9ca3af;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    
    p {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    
    .btn-retry {
      width: 100%;
      background: linear-gradient(135deg, #FF4500 0%, #ff5722 100%);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.32, 0.72, 0, 1), box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(255, 69, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .btn-retry:active {
      transform: scale(0.96);
    }
    
    .btn-retry svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    
    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: env(safe-area-inset-top, 0);
      background: #0A0E1A;
      z-index: -1;
    }
    
    .info-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      margin-top: 40px;
      margin-bottom: 20px;
    }
    
    .info-card .title {
      font-size: 13px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .info-card .value {
      font-size: 16px;
      color: #E2E8F0;
      font-weight: 500;
    }
    
    .signal-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #FF4500;
      font-size: 13px;
      margin-top: 24px;
    }
    
    .signal-dot {
      width: 8px;
      height: 8px;
      background: #FF4500;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { 
        opacity: 1;
        transform: scale(1);
      }
      50% { 
        opacity: 0.4;
        transform: scale(0.8);
      }
    }
    
    .quick-links {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    
    .quick-link {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      color: #9ca3af;
      font-size: 13px;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    
    .quick-link:active {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }
    
    .quick-link svg {
      width: 24px;
      height: 24px;
      fill: #FF4500;
      margin-bottom: 6px;
    }
    
    .quick-link span {
      display: block;
    }
  </style>
</head>
<body>
  <div class="status-bar"></div>
  
  <div class="container">
    <div class="icon-wrapper">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    <p class="subtitle">No internet connection detected</p>
    <p>Please check your connection and try again. Any pending trades will sync automatically when you're back online.</p>
    
    <button class="btn-retry" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
      </svg>
      Try Again
    </button>
    
    <div class="info-card">
      <div class="title">Status</div>
      <div class="value" id="status">Checking connection...</div>
    </div>
    
    <div class="quick-links">
      <a href="/index.html" class="quick-link">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Home</span>
      </a>
      <a href="/app.html" class="quick-link">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        <span>App</span>
      </a>
    </div>
    
    <div class="signal-indicator">
      <span class="signal-dot"></span>
      <span>Algocdk will sync when online</span>
    </div>
  </div>
  
  <script>
    // Check online status
    function updateStatus() {
      const statusEl = document.getElementById('status');
      if (navigator.onLine) {
        statusEl.textContent = 'Back online!';
        statusEl.style.color = '#00C851';
        setTimeout(() => window.location.reload(), 1000);
      } else {
        statusEl.textContent = 'Waiting for connection...';
        statusEl.style.color = '#FF4500';
      }
    }
    
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
    
    // Register service worker message
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then((registration) => {
        console.log('Service Worker ready for offline support');
      });
    }
  </script>
</body>
</html>
